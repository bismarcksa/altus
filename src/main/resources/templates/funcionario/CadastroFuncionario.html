<!DOCTYPE html>
<!-- beautify ignore:start -->
<html lang="pt" 
	  class="light-style layout-menu-fixed" 
	  dir="ltr" 
	  data-theme="theme-default" 
	  data-assets-path="/layout/" 
	  data-template="vertical-menu-template-free"
	  xmlns="http://www.w3.org/1999/xhtml"
	  xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0"/>

    <title>Account settings - Account | Funcionario</title>

    <meta name="description" content="" />

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/layout/img/favicon/favicon.ico" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&display=swap" rel="stylesheet"/>

    <!-- Icons. Uncomment required icon fonts -->
    <link rel="stylesheet" href="/layout/vendor/fonts/boxicons.css" />

    <!-- Core CSS -->
    <link rel="stylesheet" href="/layout/vendor/css/core.css" class="template-customizer-core-css" />
    <link rel="stylesheet" href="/layout/vendor/css/theme-default.css" class="template-customizer-theme-css" />
    <link rel="stylesheet" href="/layout/css/demo.css" />

    <!-- Vendors CSS -->
    <link rel="stylesheet" href="/layout/vendor/libs/perfect-scrollbar/perfect-scrollbar.css" />

    <!-- Page CSS -->

    <!-- Helpers -->
    <script src="/layout/vendor/js/helpers.js"></script>

    <!--! Template customizer & Theme config files MUST be included after core stylesheets and helpers.js in the <head> section -->
    <!--? Config:  Mandatory theme config file contain global vars & default theme options, Set your preferred theme option in this file.  -->
    <script src="/layout/js/config.js"></script>
  </head>


<html >
<body>
	<h1>Cadastro de Funcionário</h1>
	
	<div th:each="erro: ${#fields.detailedErrors('${funcionario.*}')}">
		<span th:text="${erro.message}"></span>
	</div>
	
	<form method="POST" th:object="${funcionario}">
	    <span th:text="${mensagem}"></span>
	    <br>
	    
	    <label for="nome">NOME</label>    
	    <input type="text" th:field="*{nome}"/>
	    <br>
	    
	    <label for="cpf">CPF</label>    
	    <input type="text" th:field="*{cpf}"/>
	    <br>
	    
	    <label for="email">EMAIL</label>    
	    <input type="text" th:field="*{email}"/>
	    <br>
	
	    <input type="submit" value="Salvar">
	</form>

</body>
</html>
