<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://xmlns.jcp.org/jsf/core"
	xmlns:p="http://primefaces.org/ui"
	xmlns:ui="http://xmlns.jcp.org/jsf/facelets">

<ui:insert name="metadata" />


<h:head>
	<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
	<title>A Fórmula</title>
	<h:outputStylesheet library="css" name="estilos.css"/>
	<link rel="shortcut icon" type="image/x-icon" href="#{resource['images/favicon.ico']}"/>
</h:head>

<h:body>
	<p:growl id="msgGlobal" />	
 	<div class="container-pai">
		<h:form>
			<p:panelGrid styleClass="ui-noborder" style="width:300px;margin-left:auto; margin-right:auto;">
				<h:graphicImage name="aformula.png" library="images" width="270"/>
			</p:panelGrid>	
			
			<p:panel style="width:300px; margin-left:auto; margin-right:auto;">
			    <f:facet name="header">
			        <div style="text-align:center;">
			            <i class="pi pi-users" style="margin-right:5px;"></i> AUTENTICAÇÃO
			            <br/>
			            <small style="font-size:11px; color:gray;">Ainda não tem acesso? </small>
			            <p:link outcome="/pages/primeiroAcesso.xhtml" value="Cadastre-se">
		    				<f:param name="funacao" value="Novo"/>
		    			</p:link>
			        </div>
			    </f:facet>
    
			    <div class="ui-inputgroup" style="margin-bottom:1rem;">
			        <span class="ui-inputgroup-addon"><i class="pi pi-user"></i></span>
			        <p:inputText value="#{autenticacaoBean.funcionarioLogado.login}" placeholder="Usuário"  maxlength="20" style="width:100%; text-transform: uppercase;" onkeypress="return event.key !== ' '"/>
			    </div>
			
			    <div class="ui-inputgroup" style="margin-bottom:1rem;">
			        <span class="ui-inputgroup-addon"><i class="pi pi-lock"></i></span>
			        <p:password value="#{autenticacaoBean.funcionarioLogado.senha}" placeholder="SENHA" maxlength="8" style="width:100%;"/>
			    </div>
			
			    <p:commandButton value="ENTRAR" action="#{autenticacaoBean.autenticar}" icon="pi pi-sign-in" update=":msgGlobal" style="width:100%;" />
			</p:panel>
		</h:form>
	</div>
</h:body>
</html>
