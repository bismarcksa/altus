<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://xmlns.jcp.org/jsf/core"
	xmlns:p="http://primefaces.org/ui"
	xmlns:ui="http://xmlns.jcp.org/jsf/facelets">

	<ui:composition template="/templates/modeloGeral.xhtml">
		<ui:define name="metadata">
			<f:metadata>
			 	<f:viewParam name="filacao" value="#{cargoBean.acao}"/>
				<f:viewParam name="filcod" value="#{cargoBean.codigo}"/>		
	 			<f:event listener="#{cargoBean.carregarCadastro}" type="preRenderView"/>
	 			<f:event listener="#{cargoBean.carregarPesquisa}" type="preRenderView"/>
	 		</f:metadata>
		</ui:define>
		<ui:define name="conteudo">
			<h:form id="frmFilCad">
				<p:toolbar>					
					<f:facet name="left">
                        <h:outputText value="DESCRIÇÃO DE CARGOS" style="font-size: 1.5em; font-weight: bold;"/>
                    </f:facet>
				</p:toolbar>
				
				<h:panelGrid id="pnlFilCadDados" columns="4" cellpadding="5">
					<p:outputLabel value="CÓDIGO " style="font-weight:bold"/>
					<p:inputText size="20" readonly="true"/>
					
					<p:outputLabel for="cargo" value="CARGO" style="font-weight:bold;"/>
					<p:selectOneMenu id="cargo" value="#{descricaoCargoBean.descricaoCargoCadastro.cargo}" converter="cargoConverter" style="width: 272px;">
						<f:selectItem itemValue="" itemLabel=""/>
						<f:selectItems value="#{descricaoCargoBean.listaCargos}" itemValue="#{cargo}" itemLabel="#{cargo.codigo} - #{cargo.descricao.toUpperCase()}" var="cargo"/>
						<f:validateBean />
					</p:selectOneMenu>											     
				</h:panelGrid>
				
				<h:panelGrid columns="5">
  				    <p:commandButton value="NOVO" actionListener="#{cargoBean.novo}" update=":frmFilCad:pnlFilCadDados" rendered="#{descricoCargoBean.acao == 'Novo'}" icon="pi pi-user-plus"/> 
					<p:commandButton value="SALVAR" actionListener="#{cargoBean.salvar}" update=":msgGlobal :frmFilCad:pnlFilCadDados" rendered="#{cargoBean.acao == 'Novo'}" icon="pi pi-check"/>
					<p:commandButton value="EXCLUIR" actionListener="#{cargoBean.excluir}" update=":msgGlobal" rendered="#{cargoBean.acao == 'Excluir'}" icon="pi pi-trash"/> 
					<p:commandButton value="EDITAR" actionListener="#{cargoBean.editar}" update=":msgGlobal" rendered="#{cargoBean.acao == 'Editar'}" icon="pi pi-file-edit"/>
					
					<p:button value="VOLTAR" outcome="/pages/descricaoCargoPesquisa.xhtml" icon="pi pi-chevron-left"/>
				</h:panelGrid>
			</h:form>
		</ui:define>
	</ui:composition>
</html>
