<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://xmlns.jcp.org/jsf/core"
	xmlns:p="http://primefaces.org/ui"
	xmlns:ui="http://xmlns.jcp.org/jsf/facelets">

	<ui:composition template="/templates/modeloGeral.xhtml">
		<ui:define name="metadata"> 
			<f:metadata>						
				<f:event listener="#{mensagemBean.carregarPesquisa}" type="preRenderView"/>		
				<f:event listener="#{mensagemBean.carregarCadastro}" type="preRenderView"/>	
				<f:event listener="#{mensagemContatoBean.carregarPesquisa}" type="preRenderView"/>
				<f:event listener="#{mensagemContatoBean.carregarCadastro}" type="preRenderView"/>	
				<f:event listener="#{grupoContatoBean.carregarPesquisaGruposFunc}" type="preRenderView"/>					
			</f:metadata>
		
			<style>
				html, body {
				    height: 100%;
				    margin: 0;
				    padding: 0;
				    overflow: hidden; /* isso impede o scroll na página */
				}
		        		        
			    .container {
			        display: flex;
    				flex-direction: row;
    				height: 100%;
			    }
			    
			    .mensagemContato { /* Corrigido para aplicar ao painel esquerdo */
			        width: 23%; /* Define a largura fixa para o painel esquerdo */			        
			        border-right: 1px solid #ccc; /* Separador visual entre os painéis */
			        padding: 10px;
			    }
			    
			    .mensagemPainel {
			        width: 77%; /* Define o painel direito para ocupar o restante da largura */
			        padding: 10px;
			        display: flex;
			        flex-direction: column;			        
				    flex: 1 1 auto;
				    height: 100vh; /* Garante altura total da tela */
				    overflow: hidden;		       
			    }
			    
			    .scroll-panel {	    
				    flex: 1 1 auto;
				    overflow-y: auto;
				    min-height: 0; /* Muito importante dentro de flex containers */
				    max-height: calc(100vh - 250px); /* Diminui 250px da altura total da tela */
				}
				
				.unread-badge {
			        background-color: #FF0000; /* cor do círculo */
			        color: #FFFFFF; /* cor do texto */
			        font-size: 12px;
			        font-weight: bold;
			        width: 20px;
			        height: 20px;
			        display: flex;
			        align-items: center;
			        justify-content: center;
			        border-radius: 50%;
			        margin-left: 8px; /* espaçamento entre o nome e o círculo */
			    }
			    
			   /* Esconde o nome do arquivo ao lado do componente */
				.ui-fileupload .ui-fileupload-upload {
				    display: none !important;
				}
				
				.ui-fileupload .ui-fileupload-content .ui-fileupload-preview {
				    display: none !important;
				}
				
				.ui-fileupload-filename {
			        display: none !important;
			    }
			</style>	
			<script>
				//FUNÇÃO PARA QUANDO ENVIAR MENSAGEM, ROLAR PARA BAIXO
				function scrollToBottom() {
			        var painel = document.getElementById('frmMensagem:painelMensagens');
			        painel.scrollTop = painel.scrollHeight;
			    }

		</ui:define>
		
		<ui:define name="conteudo">
			<h:form id="frmMensagem" enctype="multipart/form-data"> 							
			    <h:panelGroup layout="block" styleClass="container">
			        <!-- Tabela de contatos (painel esquerdo) -->
			        <h:panelGroup layout="block" styleClass="mensagemContato" id="painelEsquerda" style="flex: 0 0 300px; overflow-y: auto;">
			            <p:dataTable id="listagem_grupos" var="mensagemContatoGrupoCursor" widgetVar="tabela_mensagem_contato_grupo" value="#{grupoContatoBean.listaGrupoFunc}" emptyMessage="Nenhum registro encontrado" style="font-size: 15px;" stripedRows="true" size="small" rowHover="true">					        
						    <p:column> 
						        <f:facet name="header">
						            <h:outputText value="GRUPOS" />
						        </f:facet>
						        <div style="display: flex; align-items: center;">
							        <!-- Imagem do usuário -->
									<p:graphicImage value="/image?path=#{mensagemContatoGrupoCursor.grupoContatoID.grupo.foto}" width="50" height="50" style="border-radius: 50%; border: 2px solid #ccc;" rendered="#{not empty mensagemContatoGrupoCursor.grupoContatoID.grupo.foto}"/>
									<!-- Imagem padrão -->
									<p:graphicImage value="/resources/images/usuario.png" width="50" height="50" style="border-radius: 50%; border: 2px solid #ccc;" rendered="#{empty mensagemContatoGrupoCursor.grupoContatoID.grupo.foto}" />						
							        
							       
							        <div style="margin-left: 10px; text-align: left;">
							            <p:commandLink value="#{mensagemContatoGrupoCursor.grupoContatoID.grupo.descricao.toUpperCase()}" immediate="true" actionListener="#{mensagemBean.filtrarMensagensGrupo(mensagemContatoGrupoCursor.grupoContatoID.grupo)}"  action="#{mensagemBean.selecionarGrupo}"  update=":frmMensagem:painelDireita :frmMensagem:painelEsquerda" oncomplete="scrollToBottom()"/>							           							              
							        </div>
							        <h:outputText value="#{mensagemContatoGrupoCursor.mensagemNaoLida}" rendered="#{mensagemContatoGrupoCursor.mensagemNaoLida > 0}" styleClass="unread-badge"/>
							    </div>
						    </p:column>
						</p:dataTable>
			            
			            <div style="height: calc(100vh - 190px); overflow-y: auto; border: 1px solid #ccc; border-radius: 5px;">
				            <p:dataTable id="listagem_contatos" var="mensagemContatoCursor" widgetVar="tabela_mensagem_contato" value="#{mensagemContatoBean.listaMensagemContatos}" emptyMessage="Nenhum registro encontrado" style="font-size: 15px;" stripedRows="true" size="small" rowHover="true">					        
							    <p:column> 
							        <f:facet name="header">
							            <h:outputText value="CONTATOS" />
							            <p:commandLink oncomplete="PF('abrirDialogoContato').show();" style="margin-left: 5px;">
							                <i class="pi pi-plus"></i>
							            </p:commandLink>
							        </f:facet>
							        <div style="display: flex; align-items: center;">
								        <!-- Imagem do usuário -->
										<p:graphicImage value="/image?path=#{mensagemContatoCursor.contato.foto}" width="50" height="50" style="border-radius: 50%; border: 2px solid #ccc;" rendered="#{not empty mensagemContatoCursor.contato.foto}"/>
										<!-- Imagem padrão -->
										<p:graphicImage value="/resources/images/usuario.png" width="50" height="50" style="border-radius: 50%; border: 2px solid #ccc;" rendered="#{empty mensagemContatoCursor.contato.foto}" />						
								        							        							      
								        <div style="margin-left: 10px; text-align: left;">
								            <p:commandLink value="#{mensagemContatoCursor.contato.login.toUpperCase()}" immediate="true" actionListener="#{mensagemBean.filtrarMensagens(mensagemContatoCursor.contato)}"  action="#{mensagemBean.selecionarContato}"  update=":frmMensagem:painelDireita :frmMensagem:painelEsquerda" oncomplete="scrollToBottom()"/>							           
								            
								            <p:outputPanel rendered="#{privateChat.estaOnline(mensagemContatoCursor.contato.login)}">
											    <h:outputText value="ON LINE" style="font-size: 12px; color: green; display: block; margin-top: 5px;" />
											</p:outputPanel>   
								        </div>
								        <h:outputText value="#{mensagemContatoCursor.mensagemNaoLida}" rendered="#{mensagemContatoCursor.mensagemNaoLida > 0}" styleClass="unread-badge"/>
								    </div>
							    </p:column>
							</p:dataTable>
						</div>
			        </h:panelGroup>
			
			        <!-- Painel da direita com a tabela filtrada -->
			        <h:panelGroup layout="block" styleClass="mensagemPainel" id="painelDireita" style="flex: 1 1 auto; display: flex; flex-direction: column;">
					    <h:panelGrid columns="1" style="background-color: #008a97; padding: 10px; border-radius: 8px;  box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1); display: flex; align-items: center;">
						    <!-- Ícone de conversa ou avatar -->
						    <h:panelGroup layout="block" style="display: flex; align-items: center; padding: 0px 0; height: 30px;">
							    <p:avatar icon="pi pi-user" style="background-color: #ffffff; color: #008a97; margin-right: 8px; width: 50px; height: 50px;" shape="circle" />
							    <h:outputText value="#{mensagemBean.exibirContato ? mensagemBean.contatoSelecionado.nome.toUpperCase() : mensagemBean.grupoSelecionado.descricao.toUpperCase()}" style="font-size: 24px; color: #ffffff; font-weight: bold; font-family: 'Arial', sans-serif;" />						    
							</h:panelGroup>
						</h:panelGrid>
						<br></br>
			            <p:scrollPanel id="painelMensagens" widgetVar="painelMensagens" mode="native" styleClass="scroll-panel">
						    <ui:repeat value="#{mensagemBean.listaMensagensFiltrados}" var="mensagem">
						        <h:panelGroup layout="block" style="display: flex; margin-bottom: 15px; justify-content: #{mensagemBean.isEnviadaPorUsuario(mensagem) ? 'flex-end' : 'flex-start'}; font-family: Arial, sans-serif;">
						            
						            <!-- Avatar do remetente -->
						            <h:panelGroup layout="block" rendered="#{not mensagemBean.isEnviadaPorUsuario(mensagem)}" style="display: flex; flex-direction: column; align-items: center; margin-right: 10px;">  
									    <h:graphicImage value="/image?path=#{mensagem.remetente.foto}" style="width: 60px; height: 60px; border-radius: 50%;" />  
									    <h:outputText value="#{mensagem.remetente.login}" style="font-size: 10px; color: #333; margin-top: 5px;" />
									</h:panelGroup>					           					            
						            <h:panelGroup layout="block" style="max-width: 60%; padding: 12px; border-radius: 10px; font-size: 15px; background-color: #{mensagemBean.isEnviadaPorUsuario(mensagem) ? '#e0f7e0' : '#f7e0e0'}; box-shadow: 0px 2px 5px rgba(0, 0, 0, 0.2);">
						                					                						                						                
						                <h:outputText value="#{mensagem.mensagem}" escape="true" style="white-space: pre-line; font-size: 15px; color: #333;" />
						                
						                <!-- Linha horizontal separadora -->
						                <h:panelGroup id="linha" rendered="#{not empty mensagem.anexo}">
            								<br/>          								
            							</h:panelGroup>
											
						                <p:commandLink actionListener="#{mensagemBean.baixarAnexo(mensagem)}" title="Clique para baixar o anexo" style="font-size: 13px; color: #007BFF;" rendered="#{not empty mensagem.anexo}" ajax="false">						                
						                	<p:graphicImage value="/resources/images/icones/#{mensagemBean.extrairExtensao(mensagemBean.extrairNomeArquivo(mensagem.anexo))}.png" style="width:48px; height:48px; margin-right:5px;" rendered="#{not empty mensagem.anexo}" ajax="false"/>
						                	<br/>
											<h:outputText value="#{mensagemBean.extrairNomeSemPrefixo(mensagem.anexo)}" style="font-size: 13px; color: #007BFF;" />
						                </p:commandLink>			           	
						           							                
						                <h:outputText value="#{mensagem.data_envio}" style="font-size: 11px; color: #777; display: block; text-align: right; margin-top: 8px;">
						                    <f:convertDateTime pattern="dd/MM/yy HH:mm" timeZone="GMT-03:00"/>
						                </h:outputText>    
						            </h:panelGroup>
						        </h:panelGroup>
						    </ui:repeat>
						</p:scrollPanel>
			           
  			            <!-- Caixa de entrada e botão de envio fixados no rodapé -->
			            <h:panelGroup layout="block" style="display: flex; align-items: center; padding: 10px 0; border-top: 1px solid #ccc;">		    
							
 						    <p:fileUpload id="fileUpload" value="#{mensagemBean.arquivoAnexo}" label="ANEXO" chooseIcon="pi pi-paperclip" mode="simple" skinSimple="true" immediate="true" update=":msgGlobal" listener="#{mensagemBean.uploadArquivo}" accept="image/jpeg, image/png, image/jpg, application/pdf, application/vnd.ms-excel, application/vnd.openxmlformats-officedocument.spreadsheetml.sheet, application/msword, application/vnd.openxmlformats-officedocument.wordprocessingml.document, text/plain, text/csv" style="margin-right: 10px;"/>
								
						    <!-- Caixa de texto para mensagem -->
						    <p:inputTextarea id="mensagemInput" value="#{mensagemBean.mensagemCadastro.mensagem}" autoResize="true" rows="3"  cols="60" placeholder="Digite sua mensagem..."  style="flex: 1; margin-right: 8px;"/>
						    	    
						    <!-- Botão de envio -->
						    <p:commandButton value="ENVIAR" actionListener="#{mensagemBean.salvar()}" update=":msgGlobal :frmMensagem:painelDireita" icon="pi pi-check" oncomplete="scrollToBottom()" style="height: 78px;"/>						    				    
						</h:panelGroup>
			        </h:panelGroup>
			    </h:panelGroup>
			</h:form>         
					
			<p:dialog widgetVar="abrirDialogoContato" header="CONTATO" draggable="false" resizable="false" modal="true"> 
			    <h:form id="frmDialogoContato">
			    	<h:panelGrid columns="2" cellpadding="2">            			    			
			            <p:outputLabel for="funcionario" value="CONTATO" style="font-weight:bold;"/>
			            <p:selectOneMenu id="funcionario" value="#{mensagemContatoBean.mensagemContatoCadastro.contato}" converter="funcionarioConverter" style="width: 400px;" required="true"  filter="true" filterMatchMode="contains" filterNormalize="true">
			            	<f:selectItem itemValue="" itemLabel="Selecione um contato"/>
			                <f:selectItems value="#{mensagemContatoBean.listaFuncionariosTodosAtivos}" itemValue="#{funcionario}" itemLabel="#{funcionario.codigo} - #{funcionario.nome.toUpperCase()}" var="funcionario"/>
			                <f:validateBean />
			            </p:selectOneMenu>  		                    		           		      
			        </h:panelGrid>
       
			        <h:panelGrid columns="2">
			        	<p:commandButton value="CRIAR CONTATO" actionListener="#{mensagemContatoBean.salvar}" update=":msgGlobal :frmMensagem :frmDialogoContato" icon="pi pi-check" oncomplete="PF('abrirDialogoContato').hide();"/>			    
			        </h:panelGrid>					
			    </h:form>
			</p:dialog>		
        </ui:define>
	</ui:composition>
</html>
