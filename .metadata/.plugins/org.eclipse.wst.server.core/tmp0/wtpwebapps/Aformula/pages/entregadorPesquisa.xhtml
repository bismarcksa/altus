<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://xmlns.jcp.org/jsf/core"
	xmlns:p="http://primefaces.org/ui"
	xmlns:ui="http://xmlns.jcp.org/jsf/facelets">

	<ui:composition template="/templates/modeloGeral.xhtml">
		<ui:define name="metadata"> 
			<f:metadata>
				<f:event listener="#{entregadorBean.carregarPesquisa}" type="preRenderView"/>
			</f:metadata>
		</ui:define>
		
		<ui:define name="conteudo">
			<h:form>
				
				<p:dataTable var="entregadorCursor" value="#{entregadorBean.listaEntregadores}" filteredValue="#{entregadorBean.listaEntregadoresFiltrados}" emptyMessage="Nenhum registro encontrado" rows="10" paginator="true" paginatorPosition="bottom" style="margin-right: 0; padding: 0rem; font-size: 15px;" stripedRows="true" size="small">
					<f:facet name="header">
						<p:button value="NOVO ENTREGADOR" outcome="/pages/entregadorCadastro.xhtml" icon="pi pi-user-plus">
		  					<f:param name="filacao" value="Novo"/>
						</p:button>	
					</f:facet>
					
					<p:column headerText="CÓDIGO" style="width: 6%">
						<h:outputText value="#{entregadorCursor.codigo}"/>
					</p:column>
					
					<p:column headerText="NOME" >
						<h:outputText value="#{entregadorCursor.nome.toUpperCase()}"/>
					</p:column>
					
					<p:column headerText="VÍNCULO" style="width: 10%">
						<h:outputText value="#{entregadorCursor.vinculo}"/>
					</p:column>
					
					<p:column headerText="TRANSPORTADORA" style="width: 10%">					
						<h:outputText value="#{entregadorCursor.transportadora==true?'SIM':'NÃO'}" /> 
					</p:column>
					
					<p:column headerText="STATUS" style="width: 6%">					
						<h:outputText value="#{entregadorCursor.status==true?'ATIVO':'INATIVO'}" /> 
					</p:column>
					
					<p:column headerText="OPÇÕES" style="width: 17%">					
						<p:button value="Editar" outcome="/pages/entregadorCadastro.xhtml" styleClass="ui-button-secondary" style="margin-left: .5em" icon="pi pi-file-edit">
  							<f:param name="filcod" value="#{entregadorCursor.codigo}"/>
						 	<f:param name="filacao" value="Editar"/>
						</p:button>
					</p:column>	
				</p:dataTable>
			</h:form>
		</ui:define>
	</ui:composition>
</html>
