<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://xmlns.jcp.org/jsf/core"
	xmlns:p="http://primefaces.org/ui"
	xmlns:ui="http://xmlns.jcp.org/jsf/facelets">

	<ui:composition template="/templates/modeloGeral.xhtml">
		<ui:define name="metadata"> 
			<f:metadata>
   				<f:event listener="#{dashboardEntregaBean.carregarTotalEntrega}" type="preRenderView"/>					
   				<f:event listener="#{fechamentoEntregaBean.carregarPesquisa}" type="preRenderView"/>	
   				<f:event listener="#{fechamentoEntregaBean.carregarCadastro}" type="preRenderView"/> 						
			</f:metadata>
		</ui:define>
		
		<ui:define name="conteudo">
		
		<style>
    	p {
        	line-height: 1.5;
        	margin: 0;
    	}
		</style>

		<h:panelGrid columns="1" style="width:100%; background-color: #808080 !important; text-align:center; font-weight:bold;">
			<h:form>
				<p:outputLabel value="PAINEL DE ENTREGAS - ">
					<script type="text/javascript">
						document.write (monName[now.getMonth()] + "/" + now.getFullYear ())
					</script>
				</p:outputLabel>				
			</h:form>
		</h:panelGrid>
		<p:panelGrid columns="4">
			<p:card styleClass="status-badge status-formula1" style="font-weight:bold; font-size: 15px; padding: 0.0rem; height: 160px;">
    			<f:facet name="title">ENTREGAS</f:facet>
    			<h:panelGrid width="100%" style="text-align:center; font-size: 52px" >
					<h:outputText value="#{dashboardEntregaBean.totalEntregasMes}"/>  
    			</h:panelGrid>
			</p:card>
					
			<p:card styleClass="status-badge status-formula2" style="font-weight:bold; font-size: 15px; padding: 0.0rem; height: 160px;">
    			<f:facet name="title">DAV (R$)</f:facet>
    			<h:panelGrid width="100%" style="text-align:center; font-size: 52px" >
					<h:outputText value="#{dashboardEntregaBean.totalDAVMes}">  
							<f:convertNumber type="currency" currencySymbol=""/>
					</h:outputText>    
    			</h:panelGrid>
			</p:card>
			
			<p:card styleClass="status-badge status-formula1" style="font-weight:bold; font-size: 15px; padding: 0.0rem; height: 160px;">
    			<f:facet name="title">RECEBIDO (R$)</f:facet>
    			<h:panelGrid width="100%" style="text-align:center; font-size: 52px" >
					<h:outputText value="#{dashboardEntregaBean.totalRecebidosMes}">  
							<f:convertNumber type="currency" currencySymbol=""/>
					</h:outputText>    
    			</h:panelGrid>
			</p:card>
			
 			<p:card styleClass="status-badge status-formula2" style="font-weight:bold; font-size: 15px; padding: 0.0rem; height: 160px;">
    			<f:facet name="title">TAXA (R$)</f:facet>
    			<h:panelGrid width="100%" style="text-align:center; font-size: 52px" >
					<h:outputText value="#{dashboardEntregaBean.totalTaxasMes}">  
							<f:convertNumber type="currency" currencySymbol=""/>
					</h:outputText>   
    			</h:panelGrid>
			</p:card>	  
		</p:panelGrid>
		
		<p:panelGrid id="gridGraficoMes" columns="2">
 			<p:column>
    			<p:barChart id="graficoEntregaDia" model="#{dashboardEntrega.modeloBarraEmpilhadaEntregaDia}" style="width: 100%; height: 300px; background-color: #e9e9e9"/>
    		</p:column>
    		
    		<p:column>
    			<p:panelGrid id="gridGraficoMes2" columns="2">
    				<p:column style="background-color: #008a97; font-weight:bold; font-size: 15px; padding: 0.5rem; height: 300px; width: 47%">   							    										
							 <h:outputText value="DETALHES" style="font-size: 26px; font-weight: bold; color: #ffffff;" />
							<p:donutChart id="donutChart" model="#{dashboardEntrega.modeloRosquina}" fill="false" showDataLabels="true" sliceMargin="5" diameter="100" shadow="true" style="width: 100%; height: 230px;" />		    					
					</p:column>
					
					<p:column style="background-color: #00535B; font-weight:bold; font-size: 15px; padding: 0.5rem; height: 150px; width: 47%; margin-left: 34px;">   							    										
						<div style="height: 100%;">
				            <div style="padding: 0.5rem; display: flex; flex-direction: column; justify-content: center;">
					            <h:outputText value="TICKET MÉDIO (R$)" style="font-size: 26px; font-weight: bold; color: #ffffff;" />
					            
					             <div style="flex: 1; display: flex; justify-content: center; align-items: center; font-size: 55px; font-weight: bold; color: #ffffff;">
					                <h:outputText value="#{dashboardEntregaBean.totalTicketMedioMes}">  
					                    <f:convertNumber type="currency" currencySymbol=""/>
					                </h:outputText>
					            </div> 
					        </div>
			        	</div>		    					
					</p:column>
				</p:panelGrid>			
    		</p:column>
		</p:panelGrid>
		
		<p:card style="font-weight:bold; font-size: 15px; padding: 0.0rem;">
    		<h:panelGrid columns="1" style="width:100%; background-color: #bfddf3 !important; text-align:center; font-weight:bold;">
					<h:form>
						<p:commandButton value="REALIZAR FECHAMENTO" actionListener="#{fechamentoEntregaBean.editar}" update=":msgGlobal" styleClass="mr-2" icon="pi pi-check">
							<p:confirm header="CONFIRMAÇÃO" message="Deseja realizar FECHAMENTO para o mês em aberto?" icon="pi pi-exclamation-triangle"/>
						</p:commandButton>
									
						<p:confirmDialog global="true" showEffect="fade" hideEffect="fade" responsive="true" width="500">
							<p:commandButton value="NÃO" type="button" styleClass="ui-confirmdialog-no ui-button-flat"/>
							<p:commandButton value="SIM" type="button" styleClass="ui-confirmdialog-yes" />
						</p:confirmDialog>
					</h:form>
				</h:panelGrid>    			                   
			    <p:dataTable id="tabelaFechamentoEntrega" var="fechamentoEntregaCursor" value="#{fechamentoEntregaBean.listaFechamentoEntregas}" emptyMessage="Nenhum registro encontrado" rows="12" style="margin-right: 0; padding: 0rem; font-size: 13px;" stripedRows="true" showGridlines="true" size="small">
					<p:column headerText="ANO" style="width: 2%; font-weight:bold;">
						<h:outputText value="#{fechamentoEntregaCursor.ano}"/>
					</p:column>
								
					<p:column headerText="MÊS" style="width: 4%; font-weight:bold;">
						<h:outputText value="#{fechamentoEntregaCursor.mes}"/>
					</p:column>
													
					<p:column headerText="TOTAL ENTREGAS" style="width: 4%">
						<h:outputText value="#{fechamentoEntregaCursor.total_entregas}"/>
					</p:column>
					
					<p:column headerText="TOTAL DAV" style="width: 4%">
						<h:outputText value="#{fechamentoEntregaCursor.total_dav}">
							<f:convertNumber type="currency" currencySymbol="R$"/>
						</h:outputText>
					</p:column>
																									
					<p:column headerText="TOTAL RECEBIDO" style="width: 5%">
						<h:outputText value="#{fechamentoEntregaCursor.total_recebidos}">
							<f:convertNumber type="currency" currencySymbol="R$"/>
						</h:outputText>
					</p:column>
												
					<p:column headerText="TOTAL TAXA" style="width: 5%">
						<h:outputText value="#{fechamentoEntregaCursor.total_taxas}">
							<f:convertNumber type="currency" currencySymbol="R$"/>
						</h:outputText>
					</p:column>	
					
					<p:column headerText="TICKET MÉDIO" style="width: 4%">
						<h:outputText value="#{fechamentoEntregaCursor.ticket_medio}">
							<f:convertNumber type="currency" currencySymbol="R$"/>
						</h:outputText>
					</p:column>																					
												
					<p:column headerText="STATUS" style="width: 3%">
						<h:outputText value="#{fechamentoEntregaCursor.status}"/>
					</p:column>
				</p:dataTable>
			</p:card>
		</ui:define>
	</ui:composition>
</html>
