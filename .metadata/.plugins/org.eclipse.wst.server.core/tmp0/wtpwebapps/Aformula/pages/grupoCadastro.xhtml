<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://xmlns.jcp.org/jsf/core"
	xmlns:p="http://primefaces.org/ui"
	xmlns:ui="http://xmlns.jcp.org/jsf/facelets">

	<ui:composition template="/templates/modeloGeral.xhtml">
		<ui:define name="metadata">
			<f:metadata>
			 	<f:viewParam name="acao" value="#{grupoBean.acao}"/>
				<f:viewParam name="codigo" value="#{grupoBean.codigo}"/>
				<f:viewParam name="codigo" value="#{grupoContatoBean.codigo}"/>		
				<f:event listener="#{grupoBean.carregarPesquisa}" type="preRenderView"/>
	 			<f:event listener="#{grupoBean.carregarCadastro}" type="preRenderView"/>
				<f:event listener="#{grupoContatoBean.carregarPesquisa}" type="preRenderView"/>
				<f:event listener="#{grupoContatoBean.carregarCadastro}" type="preRenderView"/>
				<f:event listener="#{grupoContatoBean.carregarPesquisaFuncGrupo}" type="preRenderView"/>
	 		</f:metadata>
		</ui:define>
		<ui:define name="conteudo">
			<h:form id="frmGruCad">
				<p:toolbar>
					<f:facet name="left">
						<h:outputText value="CADASTRO DE GRUPO" style="font-size: 1.5em; font-weight: bold;"/>
					</f:facet>
				</p:toolbar>
				             
				<h:panelGrid id="pnlGruCadDados1" columns="2" cellpadding="5">
					<h:column>            
		                <h:panelGrid id="pnlGruCadDados" columns="2" cellpadding="5">			
											
							<p:outputLabel value="CÓDIGO" style="font-weight:bold"/>
							<p:outputLabel maxlength="100" size="30" value="#{grupoBean.grupoCadastro.codigo}" disabled="#{grupoBean.acao == 'editar'}"/>
										
							<p:outputLabel value="DESCRIÇÃO" style="font-weight:bold"/>
							<p:inputText maxlength="100" size="30" value="#{grupoBean.grupoCadastro.descricao}" readonly="#{grupoBean.acao == 'Participantes'}">
								<f:validateBean />
							</p:inputText>	
							
							<p:outputLabel value="CADASTRO" style="font-weight:bold"/>
							<p:outputLabel maxlength="100" size="30" value="#{grupoBean.grupoCadastro.data_cadastro}" disabled="#{grupoBean.acao == 'editar'}">	
								<f:convertDateTime pattern="dd/MM/yyyy" />
							</p:outputLabel>			
						</h:panelGrid>
					</h:column>
					
					<h:column>
						<h:panelGrid id="pnlGruCadDados2" columns="2" cellpadding="5">					
							<p:graphicImage value="/image?path=#{grupoBean.grupoCadastro.foto}" width="130" height="130" style="border-radius: 50%; border: 2px solid #ccc;"/>												    
							<div class="card" style="margin-top: 20px; text-align: center;">
								<h:form enctype="multipart/form-data">
							    	<p:fileUpload value="#{grupoBean.arquivoImagem}" label="Foto Grupo" chooseIcon="pi pi-camera" mode="simple" skinSimple="true" immediate="true" update=":msgGlobal" listener="#{grupoBean.uploadFoto}" icon="pi pi-camera" accept="image/jpeg, image/png, image/jpg" disabled="#{grupoBean.acao == 'Participantes'}"/>
							    </h:form>
							</div>                  	     
						</h:panelGrid>
					</h:column>	
				</h:panelGrid>
				
				<h:panelGrid id="pnlGruCadDados3" columns="5">
					<p:commandButton value="SALVAR" actionListener="#{grupoBean.salvar}" update=":msgGlobal :frmGruCad:pnlGruCadDados" rendered="#{grupoBean.acao == 'Novo'}" icon="pi pi-check"/>
					<p:commandButton value="EXCLUIR" actionListener="#{grupoBean.excluir}" update=":msgGlobal" rendered="#{grupoBean.acao == 'Excluir'}" icon="pi pi-trash"/> 
					<p:commandButton value="EDITAR" actionListener="#{grupoBean.editar}" update=":msgGlobal :frmGruCad" rendered="#{grupoBean.acao == 'Editar'}" icon="pi pi-file-edit"/>
					
					<p:button value="VOLTAR" outcome="/pages/grupoPesquisa.xhtml" icon="pi pi-chevron-left"/>
					
					<p:commandButton value="ADICIONAR PARTICIPANTE" rendered="#{grupoBean.acao == 'Participantes'}" oncomplete="PF('abrirDialogoContatoAdicionar').show();" icon="pi pi-user-plus" styleClass="ui-button-success"/>
																			
					<p:commandButton value="REMOVER PARTICIPANTE" rendered="#{grupoBean.acao == 'Participantes'}" actionListener="#{grupoContatoBean.excluirRegistrosSelecionados}" update=":msgGlobal :frmGruCad:grupoContatoID" icon="pi pi-user-minus" styleClass="ui-button-danger">
						<p:confirm header="CONFIRMAÇÃO" message="REMOVER PARTICIPANTE(S) SELECIONADO(S)?" icon="pi pi-exclamation-triangle"/>
					</p:commandButton>
					
					<p:confirmDialog global="true" showEffect="fade" hideEffect="fade" responsive="true" width="500">
						<p:commandButton value="NÃO" type="button" styleClass="ui-confirmdialog-no ui-button-flat"/>
						<p:commandButton value="SIM" type="button" styleClass="ui-confirmdialog-yes" />
					</p:confirmDialog>				
				</h:panelGrid>
				
				<p:divider align="center">
		        	<div class="inline-flex align-items-center">
		            	<i class="pi pi-user mr-2"/>
		            	<b>PARTICIPANTES DO GRUPO</b>
		        	</div>
				</p:divider>
					
				<p:dataTable id="grupoContatoID" var="grupoContatoCursor" value="#{grupoContatoBean.listaGrupoContatosFiltrados}" emptyMessage="Nenhum registro encontrado" rows="10" paginator="true" paginatorPosition="bottom" selection="#{grupoContatoBean.grupoContatoSelecionados}" rowKey="#{grupoContatoCursor.grupoContatoID.funcionario.codigo}" selectionRowMode="checkbox" style="margin-right: 0; padding: 0rem; font-size: 15px;" stripedRows="true" size="small">																
					<p:column selectionMode="multiple" style="width: 2%" rendered="#{grupoBean.acao == 'Participantes'}"/>								
					
					<p:column headerText="CÓDIGO" style="width: 7%; text-align: center; padding: 0.2; line-height: 0;">
						<h:outputText value="#{grupoContatoCursor.grupoContatoID.funcionario.codigo}"/>
					</p:column>
					
					<p:column style="width: 4%; text-align: center; padding: 0.2; line-height: 0;">			
						<p:graphicImage value="/image?path=#{grupoContatoCursor.grupoContatoID.funcionario.foto}" width="50" height="50" style="border-radius: 50%; border: 2px solid #ccc;"/>						
					</p:column>
					
					<p:column headerText="NOME" >
						<h:outputText value="#{grupoContatoCursor.grupoContatoID.funcionario.nome.toUpperCase()}"/>				
					</p:column>				
							
					<p:column headerText="FUNÇÃO" style="width: 20%">
						<h:outputText value="#{grupoContatoCursor.grupoContatoID.funcionario.funcao}"/>
					</p:column>
								
					<p:column headerText="STATUS" style="width: 8%">
						<h:outputText value="#{grupoContatoCursor.grupoContatoID.funcionario.status==true?'ATIVO':'INATIVO'}" style="color: #{grupoContatoCursor.grupoContatoID.funcionario.status ? 'green' : 'red'}; font-weight: bold;"/> 					
					</p:column>						
				</p:dataTable>											
			</h:form>
			
			<p:dialog widgetVar="abrirDialogoContatoAdicionar" header="CONTATO" draggable="false" resizable="false" modal="true"> 
			    <h:form id="frmDialogoContato">
			    	<h:panelGrid id="frmDialogoContato2" columns="2" cellpadding="2">
			            
			            <p:outputLabel value="GRUPO" style="font-weight:bold"/>
						<p:inputText size="30" value="#{grupoBean.grupoCadastro.descricao.toUpperCase()}" readonly="true" style="font-weight:bold"/>
			            
			            <p:outputLabel for="funcionario" value="CONTATO" style="font-weight:bold;"/>
			            <p:selectOneMenu id="funcionario" value="#{grupoContatoBean.grupoContatoID.funcionario}" converter="funcionarioConverter" style="width: 400px;" required="true"  filter="true" filterMatchMode="contains" filterNormalize="true">
			            	<f:selectItem itemValue="" itemLabel="Selecione um contato"/>
			                <f:selectItems value="#{grupoContatoBean.listaFuncionariosTodosAtivos}" itemValue="#{funcionario}" itemLabel="#{funcionario.codigo} - #{funcionario.nome.toUpperCase()}" var="funcionario"/>
			                <f:validateBean />
			            </p:selectOneMenu>  		                    		           		      
			        </h:panelGrid>
       
			        <h:panelGrid columns="2">
			        	<p:commandButton value="ADICIONAR PARTICIPANTE" actionListener="#{grupoContatoBean.salvar}" update=":msgGlobal :frmGruCad " icon="pi pi-check" oncomplete="PF('abrirDialogoContatoAdicionar').hide();"/>			    
			        </h:panelGrid>					
			    </h:form>
			</p:dialog>
		</ui:define>
	</ui:composition>
</html>
