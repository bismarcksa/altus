<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://xmlns.jcp.org/jsf/core"
	xmlns:p="http://primefaces.org/ui"
	xmlns:ui="http://xmlns.jcp.org/jsf/facelets">

	<ui:composition template="/templates/modeloGeral.xhtml">
		<ui:define name="metadata"> 
			<f:metadata>
				<f:event listener="#{bairroBean.carregarPesquisa}" type="preRenderView"/>
			</f:metadata>
		</ui:define>
		
		<ui:define name="conteudo">
			<h:form>
				<h:panelGrid id="pnlPontoCadDados" columns="6" cellpadding="5">			
					<p:commandButton value="BAIRROS" action="#{bairroBean.gerarRelatorioBairro()}" ajax="false" onclick="this.form.target='_blank'" styleClass="ui-button-warning" />
				</h:panelGrid>
				
				<p:dataTable var="bairroCursor" value="#{bairroBean.listaBairros}" filteredValue="#{bairroBean.listaBairrosFiltrados}" emptyMessage="Nenhum registro encontrado" rows="10" paginator="true" paginatorPosition="bottom" style="margin-right: 0; padding: 0rem; font-size: 15px;" stripedRows="true" size="small">
<!-- 				<f:facet name="header">
						<p:button value="NOVA FILIAL" outcome="/pages/bairroCadastro.xhtml" icon="pi pi-user-plus">
		  					<f:param name="filacao" value="Novo"/>
						</p:button>	
					</f:facet> -->
					
					<p:column headerText="CÓDIGO" style="width: 6%">
						<h:outputText value="#{bairroCursor.codigo}"/>
					</p:column>
					
					<p:column headerText="DESCRIÇÃO" >
						<h:outputText value="#{bairroCursor.descricao.toUpperCase()}"/>
					</p:column>
					
					<p:column headerText="RELATÓRIO">
						<p:commandButton value="RELATÓRIO" action="#{bairroBean.gerarRelatorioBairro2(bairroCursor.codigo)}" ajax="false" onclick="this.form.target='_blank'" styleClass="ui-button-warning" />
					</p:column>	
					
 <!-- 					<p:column headerText="OPÇÕES" style="width: 17%">
						<p:button value="Excluir" outcome="/pages/bairroCadastro.xhtml" icon="pi pi-trash">
	  						<f:param name="filcod" value="#{bairroCursor.codigo}"/>
							<f:param name="filacao" value="Excluir"/> 
						</p:button> 
						
						<p:button value="Editar" outcome="/pages/bairroCadastro.xhtml" styleClass="ui-button-secondary" style="margin-left: .5em" icon="pi pi-file-edit">
  							<f:param name="filcod" value="#{bairroCursor.codigo}"/>
						 	<f:param name="filacao" value="Editar"/>
						</p:button>
					</p:column>	-->
				</p:dataTable>
			</h:form>
		</ui:define>
	</ui:composition>
</html>
