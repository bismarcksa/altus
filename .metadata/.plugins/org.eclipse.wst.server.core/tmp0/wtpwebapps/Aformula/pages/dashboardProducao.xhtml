<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://xmlns.jcp.org/jsf/core"
	xmlns:p="http://primefaces.org/ui"
	xmlns:ui="http://xmlns.jcp.org/jsf/facelets">

	<ui:composition template="/templates/modeloGeral.xhtml">
		<ui:define name="metadata"> 
			<f:metadata>
   				<f:event listener="#{dashboardBean.carregarTotalProducao}" type="preRenderView"/>				
   				<f:event listener="#{fechamentoProducaoBean.carregarPesquisa}" type="preRenderView"/>	
   				<f:event listener="#{fechamentoProducaoBean.carregarCadastro}" type="preRenderView"/>	
			</f:metadata>
		</ui:define>
		
		<ui:define name="conteudo">
		
		<style>
    	p {
        	line-height: 1.5;
        	margin: 0;
    	}
		</style>

		<h:panelGrid columns="1" style="width:100%; background-color: #808080 !important; text-align:center; font-weight:bold;">
			<h:form>
				<p:outputLabel value="PAINEL DE PRODUÇÃO - ">
					<script type="text/javascript">
						document.write (monName[now.getMonth()] + "/" + now.getFullYear ())
					</script>
				</p:outputLabel>				
			</h:form>
		</h:panelGrid>
		
		<p:panelGrid columns="4">
			<p:card styleClass="status-badge status-formula1" style="font-weight:bold; font-size: 15px; padding: 0.0rem; height: 200px;" >
    			<f:facet name="title">CONTRATOS</f:facet>
    			<h:panelGrid width="100%" style="text-align:center; font-size: 70px" >
					<h:outputText value="#{dashboardBean.totalContrato}"/>  
    			</h:panelGrid>  			
			</p:card>
						
			<p:card styleClass="status-badge status-formula2" style="font-weight:bold; font-size: 15px; padding: 0.0rem; height: 200px;">
    			<f:facet name="title">CONT. DETALHES</f:facet>
    			<div class="grid">
				    <div class="col-12 lg:col-6 xl:col-4">
				        <div class="card">
				            <p:donutChart id="donutChart" model="#{dashboard.modeloRosquina}" fill="false" showDataLabels="true" sliceMargin="5" diameter="150" shadow="true" style="width: 100%; height: 150px;"/>
				        </div>
				    </div>
				</div>
			</p:card>
			
			<p:card styleClass="status-badge status-formula1" style="font-weight:bold; font-size: 15px; padding: 0.0rem; height: 200px;">
    			<f:facet name="title">PRODUÇÃO</f:facet>
    			<h:panelGrid columns="2" width="100%">
    				<table border="0" style="width:100%">
					    <tr>
					        <td style="width:75%">SACHÊ</td>
					        <td style="width:20%">#{dashboardBean.totalProducaoSache}</td>
					    </tr>
					    <tr>
					        <td style="width:75%">MÉDIA CONTRATO SACHÊ</td>
					        <td style="width:20%">#{dashboardBean.mediaProdContratoSache}</td>
					    </tr>
					    <tr>
					        <td style="width:75%">CÁPSULA ÓLEOSA</td>
					        <td style="width:20%">#{dashboardBean.totalProducaoCapsula}</td>
					    </tr>
					    <tr>
					        <td style="width:75%">MÉDIA CONTRATO CÁPS ÓLEOSA</td>
					        <td style="width:20%">#{dashboardBean.mediaProdContratoCapsula}</td>
					    </tr>
					</table>
    			</h:panelGrid>
			</p:card>
			
 			<p:card styleClass="status-badge status-formula2" style="font-weight:bold; font-size: 15px; padding: 0.0rem; height: 200px;">
    			<f:facet name="title">RANKING</f:facet>
    			<h:panelGrid columns="2" width="100%">
    				<h:form id="frmRankingProd">
		                    <p:panelGrid columns="1" id="panRankingProd">
<!--								<p:column style="margin-top:0px; margin-left:0px; padding: 0rem;">
									<p:dataTable id="tabelaRanking" var="rankingCursor" value="#{dashboardBean.rankingMes}" emptyMessage="Nenhum registro encontrado" style="margin-right: 0; padding: 0rem; font-size: 11px;" stripedRows="true" showGridlines="true" size="small">
										<p:column headerText="NOME" style="width: 4%; font-weight:bold;">
											<h:outputText value="#{rankingCursor.nome}"/>
										</p:column>
										<p:column headerText="QUANT" style="width: 4%; font-weight:bold;">
											<h:outputText value="#{rankingCursor.quantidadeProducao}"/>
										</p:column>
									</p:dataTable>
								</p:column>-->
							</p:panelGrid>
						</h:form>	
    			</h:panelGrid>
			</p:card>	  
		</p:panelGrid>
			
 		<p:panelGrid id="gridGraficoMes" columns="2">
 			<p:column>
    			<p:barChart id="graficoContratoDia" model="#{dashboard.modeloBarraEmpilhadaContratoDia}" style="width: 100%; height: 300px; background-color: #e9e9e9"/>
    		</p:column>
  			<p:column>
    			<p:barChart id="graficoProducaoDia" model="#{dashboard.modeloBarraEmpilhadaProducaoDia}" style="width: 100%; height: 300px; background-color: #e9e9e9"/>
    		</p:column>
		</p:panelGrid>
		
		 <div class="card">
	        <p:tabView>
	            <p:tab title="FECHAMENTO - GRÁFICOS">
	                <p:panelGrid columns="1" id="pan1" layout="tabular" style="width:100%; margin-top:0px; padding: 1rem;">
	                	<p:column style="margin: 50%; margin-top:0px; margin-left:0px; padding: 0rem;">
			                <p class="m-0">
								<p:barChart model="#{dashboard.modeloBarraEmpilhada}" legendPosition="w" minY="0" style="width: 100%; height: 400px;"/>
			                </p>
		                </p:column>
		            </p:panelGrid>
	            </p:tab>
	            <p:tab title="FECHAMENTO - DADOS">
	                <p class="m-0">
	                 	<h:panelGrid columns="1" style="width:100%; background-color: #bfddf3 !important; text-align:center; font-weight:bold;">
			    			<h:form>
								<p:commandButton value="REALIZAR FECHAMENTO" actionListener="#{fechamentoProducaoBean.editar}" update=":msgGlobal" styleClass="mr-2" icon="pi pi-check">
							    	<p:confirm header="CONFIRMAÇÃO" message="Deseja realizar FECHAMENTO para o mês em aberto?" icon="pi pi-exclamation-triangle"/>
							    </p:commandButton>
							
							    <p:confirmDialog global="true" showEffect="fade" hideEffect="fade" responsive="true" width="500">
							    	<p:commandButton value="NÃO" type="button" styleClass="ui-confirmdialog-no ui-button-flat"/>
							        <p:commandButton value="SIM" type="button" styleClass="ui-confirmdialog-yes" />
							    </p:confirmDialog>
							</h:form>
			    		</h:panelGrid>    
		                   
	                    <h:form id="frmFechamentoProd">
		                    <p:panelGrid columns="1" id="pan2">
								<p:column style="margin-top:0px; margin-left:0px; padding: 0rem;">
									<p:dataTable id="tabelaFechamento" var="fechamentoCursor" value="#{fechamentoProducaoBean.listaFechamentoProducoes}" emptyMessage="Nenhum registro encontrado" rows="12" style="margin-right: 0; padding: 0rem; font-size: 13px;" stripedRows="true" showGridlines="true" size="small">
										<p:column headerText="ANO" style="width: 2%; font-weight:bold;">
											<h:outputText value="#{fechamentoCursor.ano}"/>
										</p:column>
										<p:column headerText="MÊS" style="width: 4%; font-weight:bold;">
											<h:outputText value="#{fechamentoCursor.mes}"/>
										</p:column>
											
										<p:column headerText="CONTRATOS" style="width: 4%">
											<h:outputText value="#{fechamentoCursor.total_contratos}"/>
										</p:column>
											
										<p:column headerText="TOTAL SACHÊ" style="width: 5%">
											<h:outputText value="#{fechamentoCursor.total_sache}"/>
										</p:column>
										
										<p:column headerText="TOTAL CÁPSULA" style="width: 6%">
											<h:outputText value="#{fechamentoCursor.total_capsula}"/>
										</p:column>
											
										<p:column headerText="TOTAL SHAKE" style="width: 5%">
											<h:outputText value="#{fechamentoCursor.total_shake}"/>
										</p:column>
											
										<p:column headerText="TOTAL ENVASE" style="width: 5%">
											<h:outputText value="#{fechamentoCursor.total_envase}"/>
										</p:column>
										
										<p:column headerText="PROD. SACHÊ" style="width: 5%">
											<h:outputText value="#{fechamentoCursor.total_producao_sache}"/>
										</p:column>
										
										<p:column headerText="MÉDIA PxC SACHÊ" style="width: 5%">
											<h:outputText value="#{fechamentoCursor.media_contrato_sache}"/>
										</p:column>
										
										<p:column headerText="PROD. CÁPSULA" style="width: 6%">
											<h:outputText value="#{fechamentoCursor.total_producao_capsula}"/>
										</p:column>
										
										<p:column headerText="MÉDIA PxC CÁPSULA" style="width: 5%">
											<h:outputText value="#{fechamentoCursor.media_contrato_capsula}"/>
										</p:column>
										
										<p:column headerText="STATUS" style="width: 3%">
											<h:outputText value="#{fechamentoCursor.status}"/>
										</p:column>
									</p:dataTable>
								</p:column>
							</p:panelGrid>
						</h:form>	
	                </p>
	            </p:tab>
	        </p:tabView>
	    	</div>
		</ui:define>
	</ui:composition>
</html>
