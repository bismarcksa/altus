<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://xmlns.jcp.org/jsf/core"
	xmlns:p="http://primefaces.org/ui"
	xmlns:ui="http://xmlns.jcp.org/jsf/facelets">

	<ui:composition template="/templates/modeloGeral.xhtml">
		<ui:define name="metadata"> 
			<f:metadata>
				<f:event listener="#{producaoBean.carregarPendenteAgregadoData}" type="preRenderView"/>	
			</f:metadata>
		</ui:define>
		
		<ui:define name="conteudo">
			<div class="card">
			    <h:form>
			        <p:dataTable var="producaoCursor" value="#{producaoBean.listaProducoes}">
			            <p:column headerText="DISPENSAÇÃO"  style="width: 12%" groupRow="true">  
			            	<h:outputText value="#{producaoCursor.data_dispensacao}">
			            		<f:convertDateTime pattern="dd/MM/yyyy"/>
		            		</h:outputText>  	 
			        	</p:column>
			
			            <p:column headerText="TIPO" groupRow="true">
			                <h:outputText value="#{producaoCursor.tipo}" />
			            </p:column>
			            
			            <p:column headerText="QUANTIDADE" >
			                <h:outputText value="#{producaoCursor.totalProducaoDia}" />
			            </p:column>
			
			            <p:column headerText="STATUS" style="width: 13%">
 		         			<h:outputText value="#{producaoCursor.status}" styleClass="status-badge status-#{producaoCursor.status.toLowerCase()}" style="font-weight:bold; font-size: 20px;"/>
		        		</p:column>
			        </p:dataTable>
			    </h:form>
			</div>
		</ui:define>
	</ui:composition>
</html>
