<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://xmlns.jcp.org/jsf/core"
	xmlns:p="http://primefaces.org/ui"
	xmlns:ui="http://xmlns.jcp.org/jsf/facelets">

	<ui:composition template="/templates/modeloGeral.xhtml">
		<ui:define name="metadata">
			<f:metadata>
			 	<f:viewParam name="ocoacao" value="#{ocorrenciaBean.acao}"/>
				<f:viewParam name="ococod" value="#{ocorrenciaBean.codigo}"/>		
	 			<f:event listener="#{ocorrenciaBean.carregarCadastro}" type="preRenderView"/>
	 			<f:event listener="#{ocorrenciaBean.carregarPesquisa}" type="preRenderView"/>
	 		</f:metadata>
		</ui:define>
		<ui:define name="conteudo">
			<h:form id="frmFilCad">
				<p:toolbar>
					<f:facet name="left">
						<h:outputText value="CADASTRO DE OCORRÊNCIAS"/>
					</f:facet>
				</p:toolbar>
				
				<h:panelGrid id="pnlFilCadDados" columns="4" cellpadding="5">
					<p:outputLabel value="CÓDIGO " style="font-weight:bold"/>
					<p:inputText size="20" readonly="true"/>
					
					<p:outputLabel value="TÍTULO" style="font-weight:bold"/>
					<p:inputText maxlength="100" size="30" value="#{ocorrenciaBean.ocorrenciaCadastro.titulo}" readonly="#{ocorrenciaBean.acao == 'Excluir'}">
						<f:validateBean />
					</p:inputText>
					
					<p:outputLabel value="DESCRIÇÃO" style="font-weight:bold"/>
					<p:inputText maxlength="100" size="30" value="#{ocorrenciaBean.ocorrenciaCadastro.descricao}" readonly="#{ocorrenciaBean.acao == 'Excluir'}">
						<f:validateBean />
					</p:inputText>	
					
					<p:outputLabel value="TIPO" style="font-weight:bold;"/>
					<p:selectOneRadio id="line" value="#{ocorrenciaBean.ocorrenciaCadastro.abonarDescontar}" layout="lineDirection">
						<f:selectItem itemLabel="ABONAR" itemValue="ABONAR"/>
						<f:selectItem itemLabel="DESCONTAR" itemValue="DESCONTAR"/>
					</p:selectOneRadio>
					
					<p:outputLabel value="H. EXTRA" style="font-weight:bold;"/>
					<p:selectBooleanCheckbox value="#{ocorrenciaBean.ocorrenciaCadastro.geraHoraExtra}" itemLabel="GERA HORA EXTRA"/>
					        						        	
				    <p:outputLabel for="@next" value="HORAS" style="font-weight:bold;"/>
					<p:spinner id="rotate" value="#{ocorrenciaBean.ocorrenciaCadastro.quantidadeHoras}" min="0" max="8" rotate="true"/>									     
				</h:panelGrid>
				
				<h:panelGrid columns="5">
  				    <p:commandButton value="NOVO" actionListener="#{ocorrenciaBean.novo}" update=":frmFilCad:pnlFilCadDados" rendered="#{ocorrenciaBean.acao == 'Novo'}" icon="pi pi-user-plus"/> 
					<p:commandButton value="SALVAR" actionListener="#{ocorrenciaBean.salvar}" update=":msgGlobal :frmFilCad:pnlFilCadDados" rendered="#{ocorrenciaBean.acao == 'Novo'}" icon="pi pi-check"/>
					<p:commandButton value="EXCLUIR" actionListener="#{ocorrenciaBean.excluir}" update=":msgGlobal" rendered="#{ocorrenciaBean.acao == 'Excluir'}" icon="pi pi-trash"/> 
					<p:commandButton value="EDITAR" actionListener="#{ocorrenciaBean.editar}" update=":msgGlobal" rendered="#{ocorrenciaBean.acao == 'Editar'}" icon="pi pi-file-edit"/>
					
					<p:button value="VOLTAR" outcome="/pages/ocorrenciaPesquisa.xhtml" icon="pi pi-chevron-left"/>
				</h:panelGrid>
			</h:form>
		</ui:define>
	</ui:composition>
</html>
