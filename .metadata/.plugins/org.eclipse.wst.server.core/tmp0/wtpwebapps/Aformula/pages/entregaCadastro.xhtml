<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://xmlns.jcp.org/jsf/core"
	xmlns:p="http://primefaces.org/ui"
	xmlns:ui="http://xmlns.jcp.org/jsf/facelets">

<ui:composition template="/templates/modeloGeral.xhtml">
	<ui:define name="metadata">
		<f:metadata>
			 <f:viewParam name="sacacao" value="#{entregaBean.acao}"/>
			<f:viewParam name="saccod" value="#{entregaBean.codigo}"/>		
	 		<f:event listener="#{entregaBean.carregarCadastro}" type="preRenderView"/>
	 	</f:metadata>
	</ui:define>
		
	<ui:define name="conteudo">
		<p:toolbar>
			<f:facet name="left">
				<h:outputText value="SOLICITAÇÃO DE ENTREGA" style="font-weight:bold"/>
			</f:facet>
		</p:toolbar>	
		<div class="card">
  			<p:growl id="growlEntrega" showDetail="true" skipDetailIfEqualsSummary="true"/> 
	    		
	    	<h:form id="frmSacCad">
	    		<p:messages id="messages" showDetail="true" closable="true" life="3000">
	    			<p:autoUpdate/>
	        	</p:messages>
	        	
	            <h:panelGrid id="pnlSacCadDados" columns="4" cellpadding="5">						      						
			        <p:outputLabel for="data_entrega" value="ENTREGA" style="font-weight:bold;"/>
					<p:calendar id="data_entrega" value="#{entregaBean.entregaCadastro.data_entrega}" disabledWeekends="true" readonlyInput="true" showOn="button" style="font-weight:bold; width: 150px;" readonly="#{entregaBean.acao == 'Editar'}"/>
						            
					<p:outputLabel value="DAV" style="font-weight:bold;"/>
					<p:inputNumber id="dav" value="#{entregaBean.entregaCadastro.dav}" style="font-weight:bold;" thousandSeparator="" decimalSeparator="." decimalPlaces="0" maxValue="999999999" readonly="#{entregaBean.acao == 'Editar'}"/>
						  				      
					<p:outputLabel value="IDENTIFICADOR" style="font-weight:bold"/>
					<p:inputText maxlength="25" size="30" value="#{entregaBean.entregaCadastro.identificador}" readonly="#{entregaBean.acao == 'Editar'}">
						<f:validateBean />
					</p:inputText>
						  		
					<p:outputLabel for="funcionario" value="ATENDENTE" style="font-weight:bold;"/>
					<p:selectOneMenu id="funcionario" value="#{entregaBean.entregaCadastro.funcionario}" converter="funcionarioConverter" style="width: 272px;" disabled="#{entregaBean.acao == 'Editar'}">
						<f:selectItem itemValue="" itemLabel=""/>
						<f:selectItems value="#{entregaBean.listaFuncionariosAtendente}" itemValue="#{funcionario}" itemLabel="#{funcionario.codigo} - #{funcionario.nome.toUpperCase()}" var="funcionario"/>
						<f:validateBean />
					</p:selectOneMenu>
								
					<p:outputLabel for="entregador" value="ENTREGADOR" style="font-weight:bold;"/>
					<p:selectOneMenu id="entregador" value="#{entregaBean.entregaCadastro.entregador}" converter="entregadorConverter" style="width: 272px;" disabled="#{entregaBean.acao == 'Editar'}">
						<f:selectItem itemValue="" itemLabel=""/>
						<f:selectItems value="#{entregaBean.listaEntregadores}" itemValue="#{entregador}" itemLabel="#{entregador.codigo} - #{entregador.nome.toUpperCase()}" var="entregador"/>
						<f:validateBean />
					</p:selectOneMenu>
					
					<p:outputLabel for="cidade" value="CIDADE" style="font-weight:bold;"/>
					<p:selectOneMenu id="cidade" value="#{entregaBean.entregaCadastro.cidade}" converter="cidadeConverter" style="width: 272px;" filter="true" filterMatchMode="contains" filterNormalize="true" disabled="#{entregaBean.acao == 'Editar'}">
							<f:selectItem itemValue="" itemLabel=""/>
						   <f:selectItems value="#{entregaBean.listaCidades}" itemValue="#{cidade}" itemLabel="#{cidade.nome.toUpperCase()} - #{cidade.uf.toUpperCase()}" var="cidade"/>
					</p:selectOneMenu>
			                    
								
					<p:outputLabel value="CLIENTE " style="font-weight:bold"/>
					<p:inputText maxlength="100" size="30" value="#{entregaBean.entregaCadastro.cliente}" onblur="value=value.toUpperCase()" readonly="#{entregaBean.acao == 'Editar'}">
						<f:validateBean />
					</p:inputText>
								
					<p:outputLabel for="bairro" value="BAIRRO" style="font-weight:bold;"/>
					<p:selectOneMenu id="bairro" value="#{entregaBean.entregaCadastro.bairro}" converter="bairroConverter" style="width: 272px;" filter="true" filterMatchMode="contains" filterNormalize="true" disabled="#{entregaBean.acao == 'Editar' }">
						<f:selectItem itemValue="" itemLabel=""/>
						<f:selectItems value="#{entregaBean.listaBairrosEntrega}" itemValue="#{bairro}" itemLabel="#{bairro.codigo} - #{bairro.descricao.toUpperCase()}" var="bairro"/>
						<f:validateBean />
					</p:selectOneMenu> 
					
			        <p:outputLabel value="TAXA" style="font-weight:bold"/>
					<p:inputNumber id="taxa" value="#{entregaBean.entregaCadastro.taxa}" maxValue="99.99" decimalPlaces="2" style="font-weight:bold;  width: 150px;" readonly="#{entregaBean.acao == 'Excluir'}"/>
					
					<p:outputLabel value="VALOR DAV" style="font-weight:bold"/>
					<p:inputNumber id="valor_dav" value="#{entregaBean.entregaCadastro.valor_dav}" maxValue="9999.99" decimalPlaces="2" style="font-weight:bold;  width: 150px;" readonly="#{entregaBean.acao == 'Excluir'}"/>
				      								
					<p:outputLabel value="VALOR RECEBER" style="font-weight:bold"/>
					<p:inputNumber id="valor_receber" value="#{entregaBean.entregaCadastro.valor_receber}" maxValue="9999.99" decimalPlaces="2" style="font-weight:bold;  width: 150px;" readonly="#{entregaBean.acao == 'Excluir'}"/>
													  				      
			        <p:outputLabel for="status" value="STATUS" style="font-weight:bold;" rendered="#{entregaBean.acao != 'Excluir'}"/>
					<p:selectOneMenu id="status" value="#{entregaBean.entregaCadastro.status}" style="font-weight:bold; width: 200px;" rendered="#{entregaBean.acao != 'Excluir'}">
			            <f:selectItem itemLabel="PENDENTE" itemValue="PENDENTE"/>
			            <f:selectItem itemLabel="REALIZADA" itemValue="REALIZADA"/>
			        </p:selectOneMenu> 	 
	            </h:panelGrid>
	            
	            <h:panelGrid id="pnlSacCadDadosObservacao" columns="2" rendered="#{entregaBean.acao != 'Excluir'}">
			    	<p:outputLabel value="OBSERVAÇÃO" style="font-weight:bold" rendered="#{entregaBean.acao != 'Excluir'}"/>
			        <p:inputText maxlength="255" size="87" value="#{entregaBean.entregaCadastro.observacao}" rendered="#{entregaBean.acao != 'Excluir'}">
			       		<f:validateBean />
			        </p:inputText>
			    </h:panelGrid>
	            
	            <p:divider />
	            		
	            <h:panelGrid columns="2">
	            	<p:commandButton value="SALVAR" actionListener="#{entregaBean.salvar}" update=":msgGlobal :frmSacCad:pnlSacCadDados" rendered="#{entregaBean.acao == 'Novo'}" icon="pi pi-check"/>
	            	<p:commandButton value="EDITAR" actionListener="#{entregaBean.editar}" update=":msgGlobal" rendered="#{entregaBean.acao == 'Editar'}" icon="pi pi-user-edit"/>
	            	<p:commandButton value="EXCLUIR" actionListener="#{entregaBean.excluir}" update=":msgGlobal" rendered="#{entregaBean.acao == 'Excluir'}" icon="pi pi-trash"/> 
	            	<p:button value="VOLTAR" outcome="#{entregaBean.autenticacaoBean.funcionarioLogado.funcao eq 'LOGÍSTICA' ? '/pages/entregaPesquisa.xhtml' : '/pages/entregaFinPesquisa.xhtml'}" icon="pi pi-chevron-left"/>
	        	</h:panelGrid>
	    	</h:form>
		</div>			
	</ui:define>
	</ui:composition>
</html>
