<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://xmlns.jcp.org/jsf/core"
	xmlns:p="http://primefaces.org/ui"
	xmlns:ui="http://xmlns.jcp.org/jsf/facelets">

	<ui:composition template="/templates/modeloGeral.xhtml">
		<ui:define name="metadata"> 
			<f:metadata>
				<f:event listener="#{funcionarioBean.carregarPesquisa}" type="preRenderView"/>
			</f:metadata>
		</ui:define>
		
		<ui:define name="conteudo">
			<h:form>			
				<p:dataTable id="listagem_funcionarios" var="funcionarioCursor" value="#{funcionarioBean.listaFuncionarios}" widgetVar="tabela_funcionario" filteredValue="#{funcionarioBean.listaFuncionariosFiltrados}" emptyMessage="Nenhum registro encontrado" rows="20" paginator="true" 
				paginatorPosition="bottom" paginatorTemplate="{CurrentPageReport} {FirstPageLink} {PreviousPageLink} {PageLinks} {NextPageLink} {LastPageLink} {RowsPerPageDropdown}"
                 			 currentPageReportTemplate="{startRecord}-{endRecord} de {totalRecords} registros" 
                 			 rowsPerPageTemplate="10,20,30,40" style="margin-right: 0; padding: 0rem; font-size: 15px;" stripedRows="true" size="small">								
					
					<f:facet name="header">
						<p:button value="NOVO FUNCIONÁRIO" outcome="/pages/funcionarioCadastro.xhtml" icon="pi pi-user-plus">
		  					<f:param name="funacao" value="Novo"/>
						</p:button>	
					</f:facet>
					
					<p:column headerText="CÓDIGO" style="width: 4%">
						<h:outputText value="#{funcionarioCursor.codigo}"/>
					</p:column>
					
					<p:column style="width: 4%; text-align: center; padding: 0.2; line-height: 0;">
						<p:graphicImage value="/image?path=#{funcionarioCursor.foto}" fallbackImage="/resources/images/usuario.png" width="50" height="50" style="border-radius: 50%; border: 2px solid #ccc; " />
					</p:column>
					
					<p:column headerText="NOME" filterBy="#{funcionarioCursor.nome}" style="width: 25%">
						<h:outputText value="#{funcionarioCursor.nome.toUpperCase()}"/>
					</p:column>				
					
					<p:column headerText="FUNÇÃO" style="width: 20%">
						<h:outputText value="#{funcionarioCursor.funcao}"/>
					</p:column>
					
					<p:column headerText="LOGIN" style="width: 10%">
						<h:outputText value="#{funcionarioCursor.login}"/>
					</p:column>
					
					<p:column field="lideranca" filterBy="#{funcionarioCursor.lideranca}" headerText="LIDERANÇA" style="width: 8%;" filterMatchMode="exact" sortable="false">				
					    <f:facet name="filter">
                			<p:selectOneMenu onchange="PF('tabela_funcionario').filter()" styleClass="custom-filter">
                    			<f:selectItem itemLabel="TODOS" itemValue="#{null}" noSelectionOption="true" />
                    			<f:selectItems value="#{funcionarioCursor.lideranca}" />
                    			<f:selectItem itemLabel="SIM" itemValue="true" noSelectionOption="true" />
                    			<f:selectItem itemLabel="NÃO" itemValue="false" noSelectionOption="true" />
                			</p:selectOneMenu>
            			</f:facet>
					    <h:outputText value="#{funcionarioCursor.lideranca ? 'SIM' : 'NÃO'}" style="color: #{funcionarioCursor.lideranca ? 'green' : 'grey'}; font-weight: bold;"/>
					</p:column>

					<p:column headerText="VÍNCULO" style="width: 15%">
						<h:outputText value="#{funcionarioCursor.vinculo}"/>
					</p:column>
					
					<p:column headerText="FILIAL" style="width: 8%">
						<h:outputText value="#{funcionarioCursor.filial.codigo}"/>
					</p:column>
					
					<p:column field="status" filterBy="#{funcionarioCursor.status}" headerText="STATUS" style="width: 8%; text-align: center;" filterMatchMode="exact" sortable="false">
						<f:facet name="filter">
                			<p:selectOneMenu onchange="PF('tabela_funcionario').filter()" styleClass="custom-filter">
                    			<f:selectItem itemLabel="TODOS" itemValue="#{null}" noSelectionOption="true" />
                    			<f:selectItems value="#{funcionarioCursor.status}" />
                    			<f:selectItem itemLabel="ATIVO" itemValue="true" noSelectionOption="true" />
                    			<f:selectItem itemLabel="INATIVO" itemValue="false" noSelectionOption="true" />
                			</p:selectOneMenu>
            			</f:facet>
					    <h:outputText value="#{funcionarioCursor.status ? 'ATIVO' : 'INATIVO'}" style="color: #{funcionarioCursor.status ? 'green' : 'red'}; font-weight: bold;"/>
					</p:column>
					
					<p:column headerText="OPÇÕES" style="width: 10%">
<!-- 						<p:button value="Excluir" outcome="/pages/funcionarioCadastro.xhtml" icon="pi pi-trash">
	  						<f:param name="funcod" value="#{funcionarioCursor.codigo}"/>
							<f:param name="funacao" value="Excluir"/> 
						</p:button>  -->
						
						<p:button value="Editar" outcome="/pages/funcionarioCadastro.xhtml" styleClass="ui-button-secondary" style="margin-left: .5em" icon="pi pi-file-edit">
  							<f:param name="funcod" value="#{funcionarioCursor.codigo}"/>
						 	<f:param name="funacao" value="Editar"/>
						</p:button>
					</p:column>	
				</p:dataTable>
			</h:form>
		</ui:define>
	</ui:composition>
</html>
