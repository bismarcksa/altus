<!DOCTYPE html>      
<html lang="pt-br" 
      xmlns="http://www.w3.org/1999/xhtml"
	  xmlns:th="http://www.thymeleaf.org"
	  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	  xmlns:data="http://www.thymeleaf.org/extras/data"
	  layout:decorate="~{layout/LayoutPadrao}"
	  xmlns:brewer="http://brewer.algaworks.com">
<head>
    <title>Brewer - Cadastro de cliente</title>
    <!--<link rel="stylesheet" type="text/css" href="/static/layout/stylesheets/vendors.min.css"/>-->
</head>
<body>

<section layout:fragment="conteudo">

    <div class="page-header">
        <div class="container-fluid">
            <div class="row">
                <div class="col-xs-10">
                    <h1>Cadastro de cliente</h1>
                </div>
                <div class="col-xs-2">
                    <div class="aw-page-header-controls">
                        <a class="btn btn-default" th:href="@{/clientes}"><i class="fa fa-search"></i>                          
                            <span class="hidden-xs  hidden-sm">Pesquisar</span>
                        </a>
                    </div>
                </div>              
            </div>
        </div>
    </div>

    <div class="container-fluid">
        <form method="POST" th:object="${cliente}" th:action="@{/clientes/novo}">
        	<brewer:message/>
        
            <div class="row">
                <div class="form-group col-sm-12 bw-required" brewer:classforerror="nome">
                    <label for="nome" class="control-label">Nome</label>
                    <div class="input-group">
                        <div class="input-group-addon"><i class="fa fa-user"></i></div>
                        <input id="nome" type="text" class="form-control" autofocus="autofocus" th:field="*{nome}"/>
                    </div>
                </div>
            </div>

            <div class="row">
                <div class="form-group col-sm-4 bw-required" brewer:classforerror="tipoPessoa">
                    <label class="control-label">Tipo Pessoa</label>
                    <div>
                    	<th:block th:each="tipoPessoa : ${tiposPessoa}">
                            <div class="radio radio-inline">
                                <input th:id="|id_${tipoPessoa}|" type="radio" class="js-radio-tipo-pessoa"
                                       th:field="*{tipoPessoa}" th:value="${tipoPessoa}" 
                                       th:data-documento="${tipoPessoa.documento}" th:data-mascara="${tipoPessoa.mascara}">
                                <label class="control-label" th:for="|id_${tipoPessoa}|" th:text="${tipoPessoa.descricao}">Física</label>
                            </div>
                        </th:block>
                    </div>
                </div>

                <div class="col-sm-8  form-group">
                    <label for="cpfOuCnpj">CPF / CNPJ</label>
                    <input id="cpfOuCnpj" type="text" class="form-control" th:field="*{cpfOuCnpj}" disabled/>
                </div>
            </div>

            <div class="row">
                <div class="col-sm-4  form-group" brewer:classforerror="email">
                    <label for="email" class="control-label">E-mail</label>
                    <div class="input-group">
                        <div class="input-group-addon"><i class="fa fa-envelope"></i></div>
                        <input id="email" type="text" th:field="*{email}" class="form-control"/>
                    </div>
                </div>

                <div class="col-sm-8  form-group">
                    <label for="contato">Telefone</label>
                    <div class="input-group">
                        <div class="input-group-addon"><i class="fa fa-phone"></i></div>
                        <input id="contato" type="text" th:field="*{telefone}" class="form-control js-phone-number"/>
                    </div>
                </div>
            </div>

            <div class="row">
                <div class="col-sm-4  form-group">
                    <label for="logradouro">Logradouro</label>
                    <input id="logradouro" type="text" th:field="*{endereco.logradouro}" class="form-control"/>
                </div>

                <div class="col-sm-4  form-group">
                    <label for="numero">Número</label>
                    <input id="numero" type="text" th:field="*{endereco.numero}" class="form-control"/>
                </div>

                <div class="col-sm-4  form-group">
                    <label for="complemento">Complemento</label>
                    <input id="complemento" type="text" th:field="*{endereco.complemento}" class="form-control"/>
                </div>
            </div>

            <div class="row">
                <div class="col-sm-4  form-group">
                    <label for="cep">Cep</label>
                    <input id="cep" type="text" th:field="*{endereco.cep}" class="form-control js-cep"/>
                </div>

                <div class="col-sm-4 form-group">
                    <label for="estado">Estado</label>
                    <select id="estado" class="form-control" th:field="*{endereco.estado}">
                        <option value="">Selecione o estado</option>
                        <option th:each="estado : ${estados}" th:value="${estado.codigo}" th:text="${estado.nome}"></option>
                    </select>
                </div>

                <div class="col-sm-4 form-group">
                    <label for="cidade">Cidade</label>
                    <div class="bw-field-action">
                    	<input type="hidden" id="inputHiddenCidadeSelecionada" th:value="*{endereco.cidade} != null ? *{endereco.cidade.codigo}"/>
                        <select id="cidade" class="form-control" data:url="@{/cidades}" th:field="*{endereco.cidade}"></select>
    
                        <div class="bw-field-action__icon js-img-loading" style="display: none;">
                            <img th:src="@{/images/mini-loading.gif}"/>
                        </div>
                    </div>
                </div>
            </div>

            <div class="form-group">
                <button class="btn btn-success" type="submit">
                    Salvar
                    <i class="fa fa-check"></i>
                </button>
                <button class="btn btn-default" type="reset">Limpar</button>
            </div>

        </form>
    </div>

</section>

<th:block layout:fragment="javascript-extra">
	<script th:src="@{/javascripts/cliente.mascara-cpf-cnpj.js}"></script>
	<script th:src="@{/javascripts/cliente.combo-estado-cidade.js}"></script>
</th:block>

</body>
</html>
