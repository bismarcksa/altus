<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://xmlns.jcp.org/jsf/core"
	xmlns:p="http://primefaces.org/ui"
	xmlns:ui="http://xmlns.jcp.org/jsf/facelets">

	<ui:composition template="/templates/modeloGeral.xhtml">
		<ui:define name="metadata"> 
			<f:metadata>			
		 	    <f:viewParam name="funccod" value="#{controlePontoDetalheBean.codigo}"/> 	
				<f:viewParam name="compet" value="#{controlePontoDetalheBean.competencia}"/>
			  	<f:viewParam name="funccod" value="#{funcionarioBean.codigo}"/>	
				<f:viewParam name="status" value="#{controlePontoBean.status}"/>				
				<f:event listener="#{funcionarioBean.carregarCadastro}" type="preRenderView"/>		
	 			<f:event listener="#{controlePontoBean.carregarCadastro}" type="preRenderView"/>
	 			<f:event listener="#{controlePontoDetalheBean.carregarCadastro}" type="preRenderView"/>
	 			<f:event listener="#{controlePontoDetalheBean.carregarPesquisa}" type="preRenderView"/>
			</f:metadata>
		</ui:define>
		
		<ui:define name="conteudo">
			<h:form id="frmControlePontoDetalhe">			
				<p:toolbar>
					<f:facet name="left">
						<h:outputText value="CADASTRO DE PONTO"/>
					</f:facet>
				</p:toolbar>
				
				<h:panelGrid id="pnlPontoCadDados" columns="7" cellpadding="5">	
					<p:outputLabel value="COMPETÊNCIA " style="font-weight:bold"/>				
					<p:inputText value="#{controlePontoDetalheBean.competencia}" readonly="true" style="font-weight:bold; width: 100px;"/>
					
					<p:outputLabel value="FUNCIONÁRIO " style="font-weight:bold"/>
					<p:inputText size="30" value="#{funcionarioBean.funcionarioCadastro.nome.toUpperCase()}" readonly="true" style="font-weight:bold"/>	
					
					<p:button value="VOLTAR" outcome="/pages/controlePonto.xhtml" icon="pi pi-chevron-left" style="width: 100px;" rendered="#{autenticacaoBean.funcionarioLogado.funcao != 'ATENDENTE' and autenticacaoBean.funcionarioLogado.funcao != 'CAIXA' and autenticacaoBean.funcionarioLogado.funcao != 'TÉCNICO DE LABORATÓRIO' and autenticacaoBean.funcionarioLogado.funcao != 'LOGÍSTICA'}"/>
					
					<p:commandButton value="VISUALIZAR PONTO" action="#{controlePontoDetalheBean.gerarRelatorioControlePonto}" icon="pi pi-clock" ajax="false" onclick="this.form.target='_blank'" style="background-color: #4CAF50; color: #ffffff; border: none;" />
					
 					<p:commandButton process="@this" value="CONFIRMAR PONTO"  styleClass="ui-button-warning" icon="pi pi-pencil" update=":frmControlePontoDetalhe dialogValidaPontoDetalhe" oncomplete="PF('validaPontoDetalhe').show()" rendered="#{controlePontoBean.status == 'ABERTO'}"/>							
				</h:panelGrid>	
				
				<p:dataTable id="IdTabela" var="controlePontoDetalheCursor" value="#{controlePontoDetalheBean.listaControlePontoDetalhes}" emptyMessage="Nenhum registro encontrado" style="margin-right: 0; padding: 0rem; font-size: 15px;" stripedRows="true" size="small" rowStyleClass="#{controlePontoDetalheCursor.dia.toUpperCase() eq 'DOMINGO' ? 'controlePontoDomingo' : (not empty controlePontoDetalheCursor.ocorrencia ? 'controlePontoDomingo' : null)}">					
					<p:column headerText="DATA" style="width: 10%">
						<h:outputText value="#{controlePontoDetalheCursor.controlePontoDetalheID.data}">
							<f:convertDateTime pattern="dd/MM/yyyy" timeZone="GMT-03:00"/>
			            </h:outputText>
					</p:column>						
						
					<p:column headerText="DIA" style="width: 16%; font-weight:bold; font-size: 14px;">  
			            <h:outputText value="#{controlePontoDetalheCursor.dia.toUpperCase()}"/>	
			        </p:column>
			        	
			        <p:column headerText="ENTRADA 1" style="width: 11%; font-size: 13px;">
			        	<h:outputText value="#{controlePontoDetalheCursor.entrada1}" style="font-weight:bold; font-size: 18px;">
			        		<f:convertDateTime pattern="HH:mm" timeZone="GMT-03:00"/>
			            </h:outputText>			                           
			        </p:column>
			        	
			        <p:column headerText="SAÍDA 1" style="width: 11%; font-size: 13px;">
			        	<h:outputText value="#{controlePontoDetalheCursor.saida1}" style="font-weight:bold; font-size: 18px;">
			        		<f:convertDateTime pattern="HH:mm" timeZone="GMT-03:00"/>
			            </h:outputText>
			        </p:column>
			        	
			       	<p:column headerText="ENTRADA 2" style="width: 11%; font-size: 13px;">
			        	<h:outputText value="#{controlePontoDetalheCursor.entrada2}" style="font-weight:bold; font-size: 18px;">
			        		<f:convertDateTime pattern="HH:mm" timeZone="GMT-03:00"/>
			            </h:outputText>
			        </p:column>
			        	
			       	<p:column headerText="SAÍDA 2" style="width: 11%; font-size: 13px;">
			        	<h:outputText value="#{controlePontoDetalheCursor.saida2}" style="font-weight:bold; font-size: 18px;">
			        		<f:convertDateTime pattern="HH:mm" timeZone="GMT-03:00"/>
			            </h:outputText>
			        </p:column>
			        	
			        <p:column headerText="ENT. EXTRA" style="width: 11%; font-size: 14px;">
			        	<h:outputText value="#{controlePontoDetalheCursor.entrada3}" style="font-weight:bold; font-size: 18px;">
			        		<f:convertDateTime pattern="HH:mm" timeZone="GMT-03:00"/>
			            </h:outputText>
			        </p:column>
			
			        <p:column headerText="SAÍDA EXTRA" style="width: 11%; font-size: 14px;">
			        	<h:outputText value="#{controlePontoDetalheCursor.saida3}" style="font-weight:bold; font-size: 18px;">
			        		<f:convertDateTime pattern="HH:mm" timeZone="GMT-03:00"/>
			            </h:outputText>
			        </p:column>	        	
						
					<p:column headerText="H. TRAB" style="width: 13%; font-size: 14px;">
	 		         	<h:outputText value="#{controlePontoDetalheCursor.horas_trabalhadas}" style="font-weight:bold; font-size: 18px;">
	 		         		<f:convertDateTime pattern="HH:mm" timeZone="GMT-03:00"/>
			            </h:outputText>	
			            <f:facet name="footer">
							<h:outputText value="TOTAL" style="font-size: 22px;"/>		 	
						</f:facet>	        	
			        </p:column>
			        
			        <p:column headerText="BANCO HORAS" style="width: 13%; font-size: 14px;">
	 		         	<h:outputText value="#{controlePontoDetalheCursor.bancoHoraFormatada}" style="font-weight:bold; font-size: 18px;"/>	 		         				        	
			       		<f:facet name="footer">
							<h:outputText value="#{controlePontoDetalheBean.totalBancoHorasMesTexto}" style="font-size: 22px;"/>				 	
						</f:facet>
			        </p:column>
						
					<p:column headerText="OCORRÊNCIA" style="width: 13%; font-size: 14px;">
	 		         	<h:outputText id="colunaOcorrencia" value="#{controlePontoDetalheCursor.ocorrencia.titulo}" style="font-weight:bold; font-size: 15px;" />	 		         		
			       		<p:tooltip for="colunaOcorrencia" value="#{controlePontoDetalheCursor.ocorrencia.descricao}" position="top"/>
			        </p:column>
			        
					<p:column headerText="OPÇÕES" style="width: 17%; padding: .2rem .2rem;">							
						<p:commandButton id="btnInserirDados" process="@this" styleClass="ui-button-info" icon="pi pi-search" update=":frmControlePontoDetalhe dialogPontoDetalhe" oncomplete="PF('alteraPontoDetalhe').show()" rendered="#{controlePontoDetalheCursor.dia.toUpperCase() != 'DOMINGO' and controlePontoBean.status == 'ABERTO' and controlePontoDetalheCursor.ocorrencia == null}">			
							<f:setPropertyActionListener target="#{controlePontoDetalheBean.data}" value="#{controlePontoDetalheCursor.controlePontoDetalheID.data}" />
						</p:commandButton>	
						<p:tooltip for="btnInserirDados" value="Inserir dados" position="top"/>
						
						<p:commandButton id="btnOcorrencia" process="@this" styleClass="ui-button-warning" icon="pi pi-exclamation-triangle" update=":frmControlePontoDetalhe dialogOcorrenciaPontoDetalhe" oncomplete="PF('ocorrenciaPontoDetalhe').show()" style="width:33px; margin-left: .5em; color: white;" rendered="#{controlePontoDetalheCursor.dia.toUpperCase() != 'DOMINGO' and controlePontoBean.status == 'ABERTO' and controlePontoDetalheCursor.ocorrencia == null}">							
							<f:setPropertyActionListener target="#{controlePontoDetalheBean.data}" value="#{controlePontoDetalheCursor.controlePontoDetalheID.data}" />
						</p:commandButton>
						<p:tooltip for="btnOcorrencia" value="Registrar ocorrência" position="top"/>					
						
						<p:commandButton id="btnApagar" process="@this" actionListener="#{controlePontoDetalheBean.limparDados(controlePontoDetalheCursor.controlePontoDetalheID.competencia, controlePontoDetalheCursor.controlePontoDetalheID.funcionario.codigo, controlePontoDetalheCursor.controlePontoDetalheID.data)}" style="width:33px; margin-left: .5em" update=":msgGlobal :frmControlePontoDetalhe" styleClass="ui-button-danger" icon="pi pi-trash" rendered="#{controlePontoDetalheCursor.dia.toUpperCase() != 'DOMINGO' and controlePontoBean.status == 'ABERTO' and (controlePontoDetalheCursor.entrada1 != null or controlePontoDetalheCursor.ocorrencia != null) }">
							<p:confirm header="CONFIRMAÇÃO" message="LIMPAR MARCAÇÃO DO DIA?" icon="pi pi-exclamation-triangle"/>
						</p:commandButton>
						<p:tooltip for="btnApagar" value="Apagar" position="top"/>
							
						<p:confirmDialog global="true" showEffect="fade" hideEffect="fade" responsive="true" width="500">
							<p:commandButton value="NÃO" type="button" styleClass="ui-confirmdialog-no ui-button-flat"/>
							<p:commandButton value="SIM" type="button" styleClass="ui-confirmdialog-yes"/>
						</p:confirmDialog>	
																			
					</p:column>	
				</p:dataTable>						
			</h:form>
			
			<h:form id="dialogPontoDetalhe">
				<p:dialog widgetVar="alteraPontoDetalhe" header="DETALHES DO PONTO" draggable="false" resizable="false" modal="true"> 	
					<p:messages id="mensagemErro" for="entrada1" showDetail="false" autoUpdate="true"/>
					<h:panelGrid id="pnlPontoDetalhe1" columns="4" cellpadding="5">						
				
						<p:outputLabel value="ENTRADA 1" style="font-weight:bold"/>					
						<p:datePicker id="entrada1" value="#{controlePontoDetalheBean.controlePontoDetalheCadastro.entrada1}"  timeOnly="true" pattern="HH:mm" mask="99:99" inputStyle="font-weight:bold; font-size: 20px; width: 140px">
							<p:ajax event="blur" listener="#{controlePontoDetalheBean.validarHora()}" process="@this" update="mensagemErro"/>
						</p:datePicker>				
						
																						
						<p:outputLabel value="SAÍDA 1" style="font-weight:bold" />
						<p:datePicker id="saida1" value="#{controlePontoDetalheBean.controlePontoDetalheCadastro.saida1}" timeOnly="true" pattern="HH:mm" mask="99:99" inputStyle="font-weight:bold; font-size: 20px; width: 140px">
							<p:ajax event="blur" listener="#{controlePontoDetalheBean.validarHora()}" process="@this" update="mensagemErro"/>
						</p:datePicker>

						<p:outputLabel value="ENTRADA 2" style="font-weight:bold"/>
						<p:datePicker id="entrada2" value="#{controlePontoDetalheBean.controlePontoDetalheCadastro.entrada2}" timeOnly="true" pattern="HH:mm" mask="99:99" inputStyle="font-weight:bold; font-size: 20px; width: 140px">
							<p:ajax event="blur" listener="#{controlePontoDetalheBean.validarHora()}" process="@this" update="mensagemErro"/>
						</p:datePicker>
																										
						<p:outputLabel value="SAÍDA 2" style="font-weight:bold"/>
						<p:datePicker id="saida2" value="#{controlePontoDetalheBean.controlePontoDetalheCadastro.saida2}" timeOnly="true" pattern="HH:mm" mask="99:99" inputStyle="font-weight:bold; font-size: 20px; width: 140px">
							<p:ajax event="blur" listener="#{controlePontoDetalheBean.validarHora()}" process="@this" update="mensagemErro"/>
						</p:datePicker>
	
						<p:outputLabel value="ENTRADA EXTRA" style="font-weight:bold"/>
						<p:datePicker id="entrada3" value="#{controlePontoDetalheBean.controlePontoDetalheCadastro.entrada3}" timeOnly="true" pattern="HH:mm" mask="99:99" inputStyle="font-weight:bold; font-size: 20px; width: 140px">
							<p:ajax event="blur" listener="#{controlePontoDetalheBean.validarHora()}" process="@this" update="mensagemErro"/>
						</p:datePicker>
																										
						<p:outputLabel value="SAÍDA EXTRA" style="font-weight:bold"/>
						<p:datePicker id="saida3" value="#{controlePontoDetalheBean.controlePontoDetalheCadastro.saida3}" timeOnly="true" pattern="HH:mm" mask="99:99" inputStyle="font-weight:bold; font-size: 20px; width: 140px">
							<p:ajax event="blur" listener="#{controlePontoDetalheBean.validarHora()}" process="@this" update="mensagemErro"/>
						</p:datePicker>																		
												
					</h:panelGrid>	
					<h:panelGrid id="pnlPontoDetalhe2" columns="2" cellpadding="5" >		
						<p:commandButton value="ALTERAR" style="margin-right:0.5rem;" actionListener="#{controlePontoDetalheBean.editar}" update="@form :msgGlobal :frmControlePontoDetalhe" icon="pi pi-check"/>							
						<p:commandButton value="CANCELAR" type="button" styleClass="ui-button-secondary" icon="pi pi-times" onclick="PF('alteraPontoDetalhe').hide()" />			
					</h:panelGrid>
				</p:dialog>				
			</h:form>
			
			<h:form id="dialogValidaPontoDetalhe">
				<p:dialog widgetVar="validaPontoDetalhe" header="CONFIRMAR CONTROLE DE PONTO" draggable="false" resizable="false" modal="true"> 	
					<h:panelGrid id="pnlValidaDetalhe" columns="4" cellpadding="5">	
													
					</h:panelGrid>	
					<h:panelGrid id="pnlValidaPontoDetalhe2" columns="2" cellpadding="5" >		
						<p:commandButton value="CONFIRMAR" style="margin-right:0.5rem;" actionListener="#{controlePontoDetalheBean.validarControlePonto}" update="@form :msgGlobal :frmControlePontoDetalhe" icon="pi pi-check"/>	
						<p:commandButton value="CANCELAR" type="button" styleClass="ui-button-secondary" icon="pi pi-times" onclick="PF('validaPontoDetalhe').hide()" />			
					</h:panelGrid>
				</p:dialog>				
			</h:form>
			
			<h:form id="dialogOcorrenciaPontoDetalhe">
				<p:dialog widgetVar="ocorrenciaPontoDetalhe" header="REGISTRO DE OCORRÊNCIA" draggable="false" resizable="false" modal="true"> 	
					<h:panelGrid id="pnlPontoDetalhe1" columns="1" cellpadding="5">							
				    	<p:outputLabel value="OCORRÊNCIA" style="font-weight:bold"/>
                        <p:selectOneMenu value="#{controlePontoDetalheBean.controlePontoDetalheCadastro.ocorrencia}" converter="ocorrenciaConverter"  style="width: 254px;">
                        	<f:selectItem itemValue="" itemLabel="Selecione uma ocorrência"/>
                            <f:selectItems value="#{controlePontoDetalheBean.listaOcorrencias}" itemValue="#{ocorrencia}" itemLabel="#{ocorrencia.codigo} - #{ocorrencia.titulo.toUpperCase()}" var="ocorrencia"/>
                            <f:validateBean />
                        </p:selectOneMenu>                          			
					</h:panelGrid>	
					<h:panelGrid id="pnlPontoDetalhe2" columns="2" cellpadding="5" >		
						<p:commandButton value="ALTERAR" style="margin-right:0.5rem;" actionListener="#{controlePontoDetalheBean.registrarOcorrencia()}" update="@form :msgGlobal :frmControlePontoDetalhe" icon="pi pi-check"/>		
						<p:commandButton value="CANCELAR" type="button" styleClass="ui-button-secondary" icon="pi pi-times" onclick="PF('ocorrenciaPontoDetalhe').hide()" />			
					</h:panelGrid>
				</p:dialog>				
			</h:form>
													
		</ui:define>
	</ui:composition>
</html>
