<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://xmlns.jcp.org/jsf/core"
	xmlns:p="http://primefaces.org/ui"
	xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
	xmlns:fn="http://java.sun.com/jsp/jstl/functions">
	

	<ui:composition template="/templates/modeloGeral.xhtml">
		<ui:define name="metadata"> 
			<f:metadata>
				<f:event listener="#{producaoBean.carregarPesquisaConferencia}" type="preRenderView"/>				
			</f:metadata>
		</ui:define>
		
		<ui:define name="conteudo">
			<h:form id="frmProducaoCad">
				<p:dataTable id="listagem_producao" var="producaoCursor" widgetVar="tabela_producao" value="#{producaoBean.listaProducoesConferencia}" filteredValue="#{producaoBean.listaProducoesFiltrados}" emptyMessage="Nenhum registro encontrado" rows="15" paginator="true" 
							 paginatorPosition="bottom" paginatorTemplate="{CurrentPageReport} {FirstPageLink} {PreviousPageLink} {PageLinks} {NextPageLink} {LastPageLink} {RowsPerPageDropdown}"
                 			 currentPageReportTemplate="{startRecord}-{endRecord} de {totalRecords} registros" 
                 			 rowsPerPageTemplate="10,20,30,40"  rowStyleClass="#{producao.status == 'PENDENTE' ? 'PENDENTE' : producao.status == 'CONFERIDO' ? 'CONFERÊNCIA' : producao.status == 'DISPENSADO' ? 'DISPENSADO' : 'PRODUCAO'}" style="margin-right: 0; padding: 0rem; font-size: 15px;" stripedRows="true" size="small">
				
					<p:column headerText="FILIAL" style="width: 4%" filterBy="#{producaoCursor.filial}"> 
		            	<h:outputText value="#{producaoCursor.filial.codigo}" />  
		        	</p:column> 
		        	        	
		        	<p:column headerText="DAV" style="width: 6%" filterBy="#{producaoCursor.dav}">  
		            	<h:outputText value="#{producaoCursor.dav}-#{producaoCursor.identificador.toUpperCase()}" />  
		        	</p:column> 
		        	
		        	<p:column field="tipo" headerText="TIPO" style="width: 12%" > 
		            	<f:facet name="filter">
		                    <p:selectOneMenu onchange="PF('tabela_producao').filter()" styleClass="ui-custom-filter">
		                        <f:selectItem itemLabel="TODOS" itemValue="#{null}" noSelectionOption="true" />
		                        <f:selectItem itemLabel="SACHÊ" itemValue="SACHÊ" noSelectionOption="true" />
		                        <f:selectItem itemLabel="CÁPS. ÓLEOSA" itemValue="CÁPSULA ÓLEOSA" noSelectionOption="true" />
		                        <f:selectItem itemLabel="SHAKE" itemValue="SHAKE" noSelectionOption="true" />
		                        <f:selectItem itemLabel="ENVASE" itemValue="ENVASE" noSelectionOption="true" />
		                    </p:selectOneMenu>
		                </f:facet>
		            	<h:outputText value="#{producaoCursor.tipo}" />  
		        	</p:column>  
		        	 
		        	<p:column class="somaQuant" headerText="QUANT." style="width: 5%">  						
		            	<h:outputText value="#{producaoCursor.quantidade}" />
		            	<h:outputText value="  "/>  
		            	<h:outputText id="capsula_dobrada" value="!" rendered="#{producaoCursor.capsula_dobrada != false}" styleClass="status-badge status-formula" style="font-weight:bold; font-size: 20px;"/>
		        		<p:tooltip for="capsula_dobrada" autoHide="true">
        					<h:outputText value="CÁPS. DOBRADA"/>
    					</p:tooltip>
    					<h:outputText id="capsula_triplicada" value="!!" rendered="#{producaoCursor.capsula_triplicada != false}" styleClass="status-badge status-formula" style="font-weight:bold; font-size: 20px;"/>
		        		<p:tooltip for="capsula_triplicada" autoHide="true">
        					<h:outputText value="CÁPS. TRIPLICADA"/>
    					</p:tooltip>
		       
		        	</p:column> 
		        	        	
		        	<p:column headerText="SOLICITAÇÃO" style="width: 13%" filterBy="#{producaoCursor.data_solicitacao}">  
		            	<h:outputText value="#{producaoCursor.data_solicitacao}">
		            		<f:convertDateTime pattern="dd/MM/yyyy HH:mm" timeZone="GMT-03:00"/>
		            	</h:outputText>  
		        	</p:column>    
		        	
		        	<p:column headerText="DISPENSAÇÃO" style="width: 12%" filterBy="#{producaoCursor.data_dispensacao}">  
		            	<h:outputText value="#{producaoCursor.data_dispensacao}">
		            		<f:convertDateTime pattern="dd/MM/yyyy"/>
		            	</h:outputText>
		            	<h:outputText value="  "/>  
		            	<h:outputText id="autoHideTrue" value="!" rendered="#{producaoCursor.data_dispensacao2 != null}" styleClass="status-badge status-novo" style="font-weight:bold; font-size: 20px;"/>
		            	<p:tooltip for="autoHideTrue" autoHide="true">
        					<h:outputText value="#{producaoCursor.data_dispensacao2}">
		            			<f:convertDateTime pattern="dd/MM/yyyy"/>
		            		</h:outputText>
    					</p:tooltip>	 
		        	</p:column>
		        	
		        	<p:column headerText="SOLICITANTE" style="width: 27%" filterBy="#{producaoCursor.funcionario.nome}">  
		            	<h:outputText value="#{producaoCursor.funcionario.nome.toUpperCase()}"/>
		        	</p:column>
		        		        	    	
		        	<p:column field="status" filterBy="#{producaoCursor.status}" headerText="STATUS" style="width: 13%" filterMatchMode="exact">
 		         		<f:facet name="filter">
                			<p:selectOneMenu onchange="PF('tabela_producao').filter()" styleClass="custom-filter">
                    			<f:selectItem itemLabel="TODOS" itemValue="#{null}" noSelectionOption="true" />
                    			<f:selectItems value="#{producaoCursor.status}" />
                    			<f:selectItem itemLabel="PENDENTE" itemValue="PENDENTE" noSelectionOption="true" />
                    			<f:selectItem itemLabel="CONFERÊNCIA" itemValue="CONFERÊNCIA" noSelectionOption="true" />                 			
                				<f:selectItem itemLabel="PRODUÇÃO" itemValue="PRODUÇÃO" noSelectionOption="true" />
                    			<f:selectItem itemLabel="DISPENSADO" itemValue="DISPENSADO" noSelectionOption="true" />
                			</p:selectOneMenu>
            			</f:facet>
 		         		<h:outputText value="#{producaoCursor.status}" styleClass="status-badge status-#{producaoCursor.status.toLowerCase()}" style="font-weight:bold; font-size: 20px;"/>
		        	</p:column>
		
	 				<p:column headerText="OPÇÕES" style="width: 9%" exportable="false">					
						<p:button value="." outcome="/pages/producaoCadastroConferencia.xhtml" style="width:33px;" styleClass="ui-button-secondary" rendered="#{producaoCursor.status == 'PENDENTE' or producaoCursor.status == 'CONFERÊNCIA'}" icon="pi pi-file-edit">
  							<f:param name="saccod" value="#{producaoCursor.codigo}"/>
						 	<f:param name="sacacao" value="Editar"/>
						</p:button>													
					</p:column>
				</p:dataTable>
			</h:form>						
		</ui:define>
	</ui:composition>
</html>
