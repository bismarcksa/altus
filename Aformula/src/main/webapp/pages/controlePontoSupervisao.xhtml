<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:p="http://primefaces.org/ui"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets">

<ui:composition template="/templates/modeloGeral.xhtml">
    
    <ui:define name="metadata"> 
        <f:metadata>
            <f:event listener="#{controlePontoBean.carregarPesquisaSupervisor}" type="preRenderView"/>
            <f:event listener="#{controlePontoBean.carregarCadastro}" type="preRenderView"/>
        </f:metadata>

        <style>
            .cards-container {
                display: flex;
                flex-wrap: wrap;
                gap: 1rem;
                margin-top: 1rem;
            }

            .ponto-card {
                background-color: #fff;
                border-radius: 10px;
                box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
                padding: 1rem;
                width: 320px;
                display: flex;
                flex-direction: column;
                justify-content: space-between;
            }

            .ponto-nome {
                font-weight: bold;
                font-size: 1.2rem;
                margin-bottom: 0.3rem;
                word-wrap: break-word;
                overflow-wrap: break-word;
            }

            .ponto-funcao {
                color: #555;
                font-size: 0.9rem;
                margin-bottom: 0.5rem;
            }

            .competencia-status-container {
                display: flex;
                justify-content: space-between;
                margin-bottom: 0.5rem;
            }

            .ponto-competencia {
                
                font-weight: bold;
            }

            .ponto-status.status-aberto {
                color: #28a745;
                font-weight: bold;
            }

            .ponto-status.status-fechado {
                color: #dc3545;
                font-weight: bold;
            }

            .banco-horas.positivo {
                color: #28a745;
                font-weight: bold;
                margin-bottom: 0.5rem;
            }

            .banco-horas.negativo {
                color: #dc3545;
                font-weight: bold;
                margin-bottom: 0.5rem;
            }

            .banco-horas.neutro {
                color: #ffc107;
                font-weight: bold;
                margin-bottom: 0.5rem;
            }

            .acoes {
                margin-top: 1rem;
                display: flex;
                justify-content: space-between;
            }

            .acoes .ui-button {
                width: 48%;
            }

            @media (max-width: 768px) {
                .ponto-card {
                    width: 100%;
                }
            }
        </style>
    </ui:define>

    <ui:define name="conteudo">
        <h:form id="frmControlePonto">
            <div class="cards-container">
                <ui:repeat value="#{controlePontoBean.listaControlePontos}" var="controlePontoCursor">
                    <p:card styleClass="ponto-card">

                        <h3 class="ponto-nome">#{controlePontoCursor.funcionario.nome.toUpperCase()}</h3>
                        <div class="ponto-funcao"><i class="pi pi-briefcase">&nbsp;</i>#{controlePontoCursor.funcionario.funcao.toUpperCase()}</div>

                        <div class="competencia-status-container">
                            
                            <div class="ponto-competencia"><i class="pi pi-calendar">&nbsp;</i>#{controlePontoCursor.competencia}</div>
                            <div class="ponto-status status-#{controlePontoCursor.status.toLowerCase()}">
                                #{controlePontoCursor.status}
                            </div>
                        </div>

                        <div>                                         
                            <span style="font-size: 1.2rem;" class="status-badge #{controlePontoCursor.bancoHora gt 0 ? 'status-bancohoraPositivo' : (controlePontoCursor.bancoHora lt 0 ? 'status-bancohoraNegativo' : 'status-bancohoraZero')}">
							     #{controlePontoCursor.bancoHoraTexto}
							</span>
                        </div>

                        <div class="acoes">
                            <p:button value="PONTO" outcome="/pages/controlePontoDetalheSupervisao.xhtml"  icon="pi pi-file-edit" styleClass="ui-button-secondary">
                                <f:param name="funccod" value="#{controlePontoCursor.funcionario.codigo}" />
                                <f:param name="compet" value="#{controlePontoCursor.competencia}" />
                                <f:param name="status" value="#{controlePontoCursor.status}" />
                            </p:button>

							<p:commandButton icon="pi pi-search" actionListener="#{controlePontoBean.listarFechado(controlePontoCursor.funcionario.codigo)}" update=":frmDialogoPonto" styleClass="ui-button-edit" oncomplete="PF('abrirDialogoPonto').show();"/>
    
                        </div>
                    </p:card>
                </ui:repeat>
            </div>
        </h:form>
        
        <p:dialog widgetVar="abrirDialogoPonto" header="PONTO FECHADO" draggable="false" resizable="false" modal="true" width="500"> 
			<h:form id="frmDialogoPonto">
	         	<h:outputText style="font-size: 1.2rem; font-weight: bold;" value="#{controlePontoCursor.funcionario.nome.toUpperCase()}"/>	         	
	         	<p:dataTable var="controlePontoFechadoCursor" value="#{controlePontoBean.listarFechado}" emptyMessage="Nenhum registro encontrado" rows="5" stripedRows="true" size="small">				
					<p:column headerText="COMPETÊNCIA" style="width: 10%">
						<h:outputText style="font-size: 1.4rem; font-weight: bold;" value="#{controlePontoFechadoCursor.competencia}"/>
					</p:column>
					
					<p:column headerText="BANCO HORAS" style="width: 30%">  
			           	<h:outputText value="#{controlePontoFechadoCursor.bancoHoraTexto}"  styleClass="status-badge #{controlePontoFechadoCursor.bancoHora gt 0 ? 'status-bancohoraPositivo' : (controlePontoFechadoCursor.bancoHora lt 0 ? 'status-bancohoraNegativo' : 'status-bancohoraZero')}"   style="font-weight:bold; font-size: 20px;"/>	
			        </p:column>
				</p:dataTable>       				
			</h:form>
		</p:dialog>

        <p:confirmDialog global="true" showEffect="fade" hideEffect="fade" responsive="true" width="500">
            <p:commandButton value="NÃO" type="button" styleClass="ui-confirmdialog-no ui-button-flat" />
            <p:commandButton value="SIM" type="button" styleClass="ui-confirmdialog-yes" />
        </p:confirmDialog>

        <p:dialog widgetVar="abrirDialogoControlePonto" header="CONTROLE DE PONTO" draggable="false" resizable="false" modal="true"> 
            <h:form id="frmDialogoControlePonto">
                <p:panel id="pnlDialogoControlePonto" style="margin-bottom:10px;">
                    <h:panelGrid columns="1" cellpadding="2">            			    
                        <h:outputText value="GERAR FOLHA DE PONTO?" style="font-size: 20px;" />
                        <h:outputText value="COMPETÊNCIA - #{controlePontoBean.competencia}" style="font-weight:bold; font-size: 20px;" />

                        <h:panelGrid columns="2">
                            <p:commandButton value="GERAR" 
                                             actionListener="#{controlePontoBean.gerarPontoGeral(controlePontoBean.competencia)}" 
                                             update=":msgGlobal :frmControlePonto :frmDialogoControlePonto:pnlDialogoControlePonto" 
                                             icon="pi pi-check" 
                                             oncomplete="PF('abrirDialogoControlePonto').hide();" />
                            <p:button value="VOLTAR" outcome="/pages/controlePonto.xhtml" icon="pi pi-chevron-left" />
                        </h:panelGrid>					
                    </h:panelGrid>
                </p:panel>
            </h:form>
        </p:dialog>

    </ui:define>

</ui:composition>
</html>
