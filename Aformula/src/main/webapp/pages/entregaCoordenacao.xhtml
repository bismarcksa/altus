<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://xmlns.jcp.org/jsf/core"
	xmlns:p="http://primefaces.org/ui"
	xmlns:ui="http://xmlns.jcp.org/jsf/facelets">

	<ui:composition template="/templates/modeloGeral.xhtml">
		<ui:define name="metadata"> 
			<f:metadata>
				<f:event listener="#{entregaBean.carregarPesquisaEntregaExtra}" type="preRenderView"/>
				<f:event listener="#{entregaBean.carregarCadastro}" type="preRenderView"/>
			</f:metadata>
			<h:outputScript>
		        function desabilitaDomingo(date) {
		            var day = date.getDay();
		            return [day !== 0, '']; // Retorna true para habilitar, false para desabilitar.
		        }
		    </h:outputScript>
		    <style>
		        .uppercase {
		            text-transform: uppercase;
		        }
		       
		       .custom-panelgrid .ui-panelgrid-cell:nth-child(2n+1) {
				    width: 150px; /* Defina a largura desejada para a primeira coluna */
				    font-weight: bold; /* Mantém o texto em negrito */
				}
		    </style>
		</ui:define>
		
		<ui:define name="conteudo">
			<h:form id="frmEntregaCad">
				<p:dataTable id="listagem_entrega" var="entregaCursor" widgetVar="tabela_entrega" value="#{entregaBean.listaEntregas}" 
							 filteredValue="#{entregaBean.listaEntregasFiltrados}" emptyMessage="Nenhum registro encontrado" rows="10" paginator="true" 
							 paginatorPosition="bottom" paginatorTemplate="{CurrentPageReport} {FirstPageLink} {PreviousPageLink} {PageLinks} {NextPageLink} {LastPageLink} {RowsPerPageDropdown}"
                 			 currentPageReportTemplate="{startRecord}-{endRecord} de {totalRecords} registros"
                 			 rowsPerPageTemplate="10,20,30,40"  rowStyleClass="#{entrega.status le 'PENDENTE' ? 'PENDENTE' : 'REALIZADA'}" style="margin-right: 0; padding: 0rem; font-size: 15px;" stripedRows="true" size="small" rowKey="#{entregaCursor.codigo}">					
					
					<p:column style="width:1.7rem" ariaHeaderText="Row Toggler">
						<p:rowToggler/>
					</p:column>						
									
					<p:column headerText="DATA" style="width: 7%">  
		            	<h:outputText value="#{entregaCursor.data_entrega}">
		            		<f:convertDateTime pattern="dd/MM/yyyy"/>
		            	</h:outputText>  
		        	</p:column> 
		        	        	
		        	<p:column headerText="DAV" style="width: 15%">  
		            	<h:outputText value="#{entregaCursor.dav} - #{entregaCursor.identificador}" />  
		        	</p:column> 	        		        	
		        	
		        	<p:column headerText="ENTREGADOR" style="width: 10%">  
		            	<h:outputText value="#{entregaCursor.entregador.nome.toUpperCase()}"/>	
		        	</p:column>
		        	
		        	<p:column headerText="CLIENTE" style="width: 13%">  
		            	<h:outputText value="#{entregaCursor.cliente}" />  
		        	</p:column>  
		        	 
		        	<p:column headerText="BAIRRO" style="width: 16%">  
		            	<h:outputText value="#{entregaCursor.bairro.descricao}" />  
		        	</p:column>
		        	
		        	<p:column headerText="TAXA" style="width: 6%">  
		            	<h:outputText value="#{entregaCursor.taxa}">  
							<f:convertNumber type="currency" currencySymbol="R$"/>
						</h:outputText>
		        	</p:column>
		        	
		        	<p:column headerText="V. DAV" style="width: 6%">  
		            	<h:outputText value="#{entregaCursor.valor_dav}">
		            		<f:convertNumber type="currency" currencySymbol="R$"/>
						</h:outputText>  
		        	</p:column> 
		        	
		        	<p:column headerText="V. RECEBER" style="width: 8%">  
		            	<h:outputText value="#{entregaCursor.valor_receber}">
		            		<f:convertNumber type="currency" currencySymbol="R$"/>
						</h:outputText>  
		        	</p:column> 	
		        	
		        	<p:column headerText="" style="width:2%" >		         		 		         		
		        		<h:outputText id="autorizacao_entrega" value="!"  styleClass="status-badge status-pendente" style="font-weight:bold; font-size: 20px;" rendered="#{entregaCursor.entregador.vinculo != 'CELETISTA'}"/>	        		
		        		<p:tooltip for="autorizacao_entrega" autoHide="true">
        					<h:outputText value="#{entregaCursor.autorizacao_entrega le false ? 'NÃO AUTORIZADO' : 'AUTORIZADO'}"/>
    					</p:tooltip>
		        	</p:column>
		        	
		        	<p:column headerText="STATUS" style="width: 13%">		         		
 		         		<h:outputText value="#{entregaCursor.status}" styleClass="status-badge status-#{entregaCursor.status.toLowerCase()}" style="font-weight:bold; font-size: 20px;"/>
		        	</p:column>	        	     			       				                   
					
					<p:column headerText="" style="width: 2.6%" exportable="false">					
						<p:commandButton value="." actionListener="#{entregaBean.autorizarEntrega(entregaCursor.codigo)}" update=":msgGlobal" style="width:33px;" styleClass="ui-button-secondary" icon="pi pi-check">
							<p:confirm header="CONFIRMAÇÃO" message="AUTORIZAR ENTREGA EXTRA?" icon="pi pi-exclamation-triangle"/>	    	
						</p:commandButton>	
						
						<p:confirmDialog global="true" showEffect="fade" hideEffect="fade" responsive="true" width="500">
							<p:commandButton value="NÃO" type="button" styleClass="ui-confirmdialog-no ui-button-flat"/>
							<p:commandButton value="SIM" type="button" styleClass="ui-confirmdialog-yes" process="@this" update=":frmEntregaCad"/>
						</p:confirmDialog>												  					
					</p:column>
					
					<p:rowExpansion>
		                <div class="entrega_observacoes">                   		                                           
		            	 	<p:panelGrid columns="2" styleClass="custom-panelgrid">
			            		<p:outputLabel value="ATENDENTE: " style="font-weight:bold; width: 50px"/>
			            		<h:outputText value="#{entregaCursor.funcionario.nome.toUpperCase()}"/>
			            			
			            		<p:outputLabel value="AUTORIZAÇÃO: " style="font-weight:bold; width: 50px"/>
			            		<h:outputText value="#{entregaCursor.autorizacao_entrega le false ? 'NÃO AUTORIZADO' : 'AUTORIZADO'}"/>
			            			
			            		<p:outputLabel value="FUNCIONÁRIO AUT.: " style="font-weight:bold; width: 50px" rendered="#{entregaCursor.autorizador.nome != null}"/>
			            		<h:outputText value="#{entregaCursor.autorizador.nome}" rendered="#{entregaCursor.autorizador.nome != null}"/>
			            			
			            		<p:outputLabel value="DATA AUT.: " style="font-weight:bold; width: 50px" rendered="#{entregaCursor.autorizador.nome != null}"/>
			            		<h:outputText value="#{entregaCursor.data_autorizacao}" rendered="#{entregaCursor.autorizador.nome != null}">
			            			<f:convertDateTime pattern="dd/MM/yyyy HH:mm" timeZone="GMT-03:00"/>
			            		</h:outputText>			            						            			
			            			
			            		<p:outputLabel value="CIDADE: " style="font-weight:bold; width: 50px" rendered="#{entregaCursor.cidade.nome != null}"/>
			            		<h:outputText value="#{entregaCursor.cidade.nome}" rendered="#{entregaCursor.cidade.nome != null}"/>
			            			
			            		<p:outputLabel value="OBSERVAÇÃO: " style="font-weight:bold; width: 50px" rendered="#{entregaCursor.observacao != null}"/>
			            		<h:outputText value="#{entregaCursor.observacao}" rendered="#{entregaCursor.observacao != null}"/>		            			
		            		</p:panelGrid>
		                </div>
		            </p:rowExpansion> 
				</p:dataTable>
			</h:form>				
	</ui:define>
	</ui:composition>
</html>
