<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://xmlns.jcp.org/jsf/core"
	xmlns:p="http://primefaces.org/ui"
	xmlns:ui="http://xmlns.jcp.org/jsf/facelets">

<ui:define name="metadata">
	<f:metadata>
		<f:viewParam name="funacao" value="#{funcionarioBean.acao}"/>	
		<f:event listener="#{funcionarioBean.carregarCadastro}" type="preRenderView"/>
	</f:metadata>
</ui:define>

<h:head>
	<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
	<title>A Fórmula</title>
	<h:outputStylesheet library="css" name="estilos.css"/>
</h:head>

<h:body>
<script>
	PrimeFaces.locales['pt'] = {
        closeText: 'Fechar',
        prevText: 'Anterior',
        nextText: 'Próximo',
        currentText: 'Começo',
        monthNames: ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'],
        monthNamesShort: ['Jan','Fev','Mar','Abr','Mai','Jun', 'Jul','Ago','Set','Out','Nov','Dez'],
        dayNames: ['Domingo','Segunda','Terça','Quarta','Quinta','Sexta','Sábado'],
        dayNamesShort: ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'],
        dayNamesMin: ['D','S','T','Q','Q','S','S'],
        weekHeader: 'Semana',
        firstDay: 1,
        isRTL: false,
        showMonthAfterYear: false,
        yearSuffix: '',
        timeOnlyTitle: 'Só Horas',
        timeText: 'Tempo',
        hourText: 'Hora',
        minuteText: 'Minuto',
        secondText: 'Segundo',
        currentText: 'Data Atual',
        ampm: false,
        month: 'Mês',
        week: 'Semana',
        day: 'Dia',
        allDayText : 'Todo Dia'
    };
</script>	
	<p:growl id="msgGlobal" />
	<h:form id="frmFunCad">
		<p:toolbar>
			<f:facet name="left">
				<h:outputText value="CADASTRO DE FUNCIONÁRIOS"/>
			</f:facet>
		</p:toolbar>
				
		<h:panelGrid id="pnlFunCadGeralDados" columns="3" style="display: flex; justify-content: space-between; margin-top: 20px;">	
			<h:column style="flex: 1; padding-right: 20px;">                
            	<h:panelGrid id="pnlFunCadDados" columns="4" cellpadding="5">	
					<p:outputLabel value="NOME COMPLETO" style="font-weight:bold"/>
					<p:inputText maxlength="50" size="30" value="#{funcionarioBean.funcionarioCadastro.nome}" style="text-transform: uppercase;">
						<f:validateBean />
					</p:inputText>
											
					<p:outputLabel value="CPF " style="font-weight:bold"/>
					<p:inputMask mask="999.999.999-99" size="20" value="#{funcionarioBean.funcionarioCadastro.cpf}">
						<f:validateBean/>
					</p:inputMask>
							
					<p:outputLabel for="data_nascimento" value="DATA NASCIMENTO " style="font-weight:bold; width: 150px"/>
					<p:calendar size="25" id="data_nascimento" value="#{funcionarioBean.funcionarioCadastro.data_nascimento}" navigator="true" yearRange="c-60:c-15" showOn="button" style="font-weight:bold; width: 226px;"/>
					            				
					<p:outputLabel value="FUNÇÃO " style="font-weight:bold"/>
					<p:selectOneMenu size="40" value="#{funcionarioBean.funcionarioCadastro.funcao}" readonly="#{funcionarioBean.acao == 'Excluir'}" style="width: 227px;">
						<f:validateBean />
						<f:selectItem itemValue="" itemLabel="Selecione uma opção"/>
						<f:selectItem itemValue="ATENDENTE" itemLabel="ATENDENTE"/>
						<f:selectItem itemValue="COORDENADOR DE LABORATÓRIO" itemLabel="COORDENADOR DE LABORATÓRIO"/>
						<f:selectItem itemValue="ENTREGADOR" itemLabel="ENTREGADOR"/>
						<f:selectItem itemValue="FARMACÊUTICO" itemLabel="FARMACÊUTICO"/>
						<f:selectItem itemValue="FINANCEIRO" itemLabel="FINANCEIRO"/>
						<f:selectItem itemValue="GERENTE" itemLabel="GERENTE"/>
						<f:selectItem itemValue="LOGÍSTICA" itemLabel="LOGÍSTICA"/>
						<f:selectItem itemValue="TÉCNICO DE LABORATÓRIO" itemLabel="TÉCNICO DE LABORATÓRIO"/>								
					</p:selectOneMenu>
					
					<p:outputLabel value="FILIAL" style="font-weight:bold"/>
					<p:selectOneMenu value="#{funcionarioBean.funcionarioCadastro.filial}" converter="filialConverter" style="width: 272px;">
						<f:selectItem itemValue="" itemLabel=""/>
						<f:selectItems value="#{funcionarioBean.listaFiliais}" itemValue="#{filial}" itemLabel="#{filial.razaoSocial.toUpperCase()}" var="filial"/>
						<f:validateBean />
					</p:selectOneMenu>
					
					<p:outputLabel value="VÍNCULO " style="font-weight:bold"/>
					<p:selectOneMenu size="40" value="#{funcionarioBean.funcionarioCadastro.vinculo}" readonly="#{funcionarioBean.acao == 'Excluir'}" style="width: 227px;">
						<f:validateBean />
						<f:selectItem itemValue="" itemLabel="Selecione uma opção"/>
						<f:selectItem itemValue="CELETISTA" itemLabel="CELETISTA"/>
						<f:selectItem itemValue="TERCEIRIZADO" itemLabel="TERCEIRIZADO"/>
						<f:selectItem itemValue="OUTROS" itemLabel="OUTROS"/>								
					</p:selectOneMenu>
					
					<p:outputLabel value="LIDERANÇA" style="font-weight:bold"/>
		            <p:toggleSwitch id="lideranca" value="#{funcionarioBean.funcionarioCadastro.lideranca}" disabled="true"/>                     		                            
								
					<p:outputLabel value="ATIVO" style="font-weight:bold" />
					<p:toggleSwitch id="status" value="#{funcionarioBean.funcionarioCadastro.status}" />
					
					<p:outputLabel value="LOGIN" style="font-weight:bold"/>
		            <p:inputText maxlength="20" value="#{funcionarioBean.funcionarioCadastro.login}" style="text-transform: uppercase;" onkeypress="return event.key !== ' '"/>
		                            		
					<p:outputLabel value="SENHA" style="font-weight:bold" />
					<p:password maxlength="8" size="20" redisplay="true" value="#{funcionarioBean.funcionarioCadastro.senha}" onkeypress="return event.key !== ' '">
						<f:validateBean />
					</p:password>
					
					<p:outputLabel value="CÓDIGO " style="font-weight:bold" rendered="false"/>
					<p:inputText size="20" readonly="true" rendered="false"/> 		
				</h:panelGrid>
            </h:column>
                    
			<!-- Foto do Funcionário -->
			<h:column style="flex: 0 0 200px; display: flex; flex-direction: column; align-items: center;">
				<p:graphicImage id="fotoFuncionario" value="/image?path=#{funcionarioBean.funcionarioCadastro.foto}" fallbackImage="resources/images/usuario.jpg" width="200" height="200" style="border-radius: 50%; border: 2px solid #ccc;" />
					    
				<div class="card" style="margin-top: 20px; text-align: center;">
					<h:form enctype="multipart/form-data">
						<p:fileUpload value="#{funcionarioBean.arquivoImagem}" label="Alterar Foto" chooseIcon="pi pi-camera" mode="simple" skinSimple="true" immediate="true" update=":msgGlobal" listener="#{funcionarioBean.uploadFoto}" icon="pi pi-camera" accept="image/jpeg, image/png, image/jpg"/>
					</h:form>
				</div>                  
			</h:column>
		</h:panelGrid>
				
		<h:panelGrid columns="5">
  			<p:commandButton value="NOVO" actionListener="#{funcionarioBean.novo}" update=":frmFunCad:pnlFunCadDados" rendered="#{funcionarioBean.acao == 'Outro'}" icon="pi pi-user-plus"/> 
			<p:commandButton value="SALVAR" actionListener="#{funcionarioBean.salvar}" update=":msgGlobal :frmFunCad:pnlFunCadDados" rendered="#{funcionarioBean.acao == 'Novo'}" icon="pi pi-check"/>	
			<p:button value="VOLTAR" outcome="/pages/autenticacao.xhtml" icon="pi pi-chevron-left"/>
		</h:panelGrid>	
	</h:form>
</h:body>
</html>
