<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://xmlns.jcp.org/jsf/core"
	xmlns:p="http://primefaces.org/ui"
	xmlns:ui="http://xmlns.jcp.org/jsf/facelets">

	<ui:composition template="/templates/modeloGeral.xhtml">
		<ui:define name="metadata"> 
			<f:metadata>
				<f:event listener="#{supervisaoEquipeBean.carregarPesquisa}" type="preRenderView"/>
				<f:event listener="#{supervisaoEquipeBean.carregarCadastro}" type="preRenderView"/>
			</f:metadata>
		</ui:define>
		
		<ui:define name="conteudo">
			<h:form id="frmSupervisaoCad">
				<p:dataTable id="listagem_supervisao" var="supervisaoCursor" widgetVar="tabela_supervisao" value="#{supervisaoEquipeBean.listaSupervisoesEquipe}" 
							 filteredValue="#{supervisaoEquipeBean.listaSupervisoesEquipeFiltrados}" emptyMessage="Nenhum registro encontrado" rows="10" paginator="true" 
							 paginatorPosition="bottom" paginatorTemplate="{CurrentPageReport} {FirstPageLink} {PreviousPageLink} {PageLinks} {NextPageLink} {LastPageLink} {RowsPerPageDropdown}"
                 			 currentPageReportTemplate="{startRecord}-{endRecord} de {totalRecords} registros"
                 			 rowsPerPageTemplate="10,20,30,40"  style="margin-right: 0; padding: 0rem; font-size: 15px;" stripedRows="true">
					<f:facet name="header">
						<p:commandButton value="INCLUIR FUNCIONÁRIO" actionListener="#{supervisaoEquipeBean.novo}" update="frmDialogoSupervisao:pnlDialogoSupervisao" icon="pi pi-user-plus" style="font-weight:bold;" oncomplete="PF('abrirDialogoSupervisao').show();"/>		
					</f:facet>
						
					<p:column headerText="CÓDIGO" style="width: 5%">  
		            	<h:outputText value="#{supervisaoCursor.codigo}" />  
		        	</p:column>	
									
					<p:column headerText="SUPERVISOR" style="width: 15%">  
		            	<h:outputText value="#{supervisaoCursor.nome.toUpperCase()}" />  
		        	</p:column> 
		        	
		        	<p:column headerText="FUNÇÃO" style="width: 15%">  
		            	<h:outputText value="#{supervisaoCursor.funcao.toUpperCase()}" />  
		        	</p:column>
		        	
		        	<p:column headerText="EQUIPE" style="width: 15%">  
		            	 <p:commandButton value="Participantes" actionListener="#{supervisaoEquipeBean.listarEquipe(supervisaoCursor.codigo)}" update=":frmDialogoSupervisaoUsuarios:pnlDialogoSupervisaoUsuarios" icon="pi pi-user" style="font-weight:bold;" oncomplete="PF('abrirDialogoSupervisaoUsuarios').show();"/> 
		        	</p:column> 
				</p:dataTable>
			</h:form>
			
			
			<p:dialog widgetVar="abrirDialogoSupervisao" header="SUPERVISÃO" draggable="false" resizable="false" modal="true"> 
			    <h:form id="frmDialogoSupervisao">
			    	<h:panelGrid id="pnlDialogoSupervisao" columns="2" cellpadding="2">
			            
			            <p:outputLabel for="funcionario" value="FUNCIONÁRIO" style="font-weight:bold;"/>
			            <p:selectOneMenu id="funcionario" value="#{supervisaoEquipeBean.supervisaoEquipeID.funcionario}" converter="funcionarioConverter" style="width: 400px;" required="true"  filter="true" filterMatchMode="contains" filterNormalize="true">
			            	<f:selectItem itemValue="" itemLabel="Selecione um contato"/>
			                <f:selectItems value="#{supervisaoEquipeBean.listaFuncionariosTodosAtivos}" itemValue="#{funcionario}" itemLabel="#{funcionario.codigo} - #{funcionario.nome.toUpperCase()}" var="funcionario"/>
			                <f:validateBean />
			            </p:selectOneMenu>  		                    		           		      
			        </h:panelGrid>
       
			        <h:panelGrid columns="2">
			        	<p:commandButton value="ADICIONAR" actionListener="#{supervisaoEquipeBean.salvar}" update=":msgGlobal :frmSupervisaoCad " icon="pi pi-check" oncomplete="PF('abrirDialogoSupervisao').hide();"/>			    
			        </h:panelGrid>					
			    </h:form>
			</p:dialog>
			
			<p:dialog widgetVar="abrirDialogoSupervisaoUsuarios" draggable="false" resizable="false" modal="true"  width="650" > 
			    <h:form id="frmDialogoSupervisaoUsuarios">
			    	<h:panelGrid id="pnlDialogoSupervisaoUsuarios" columns="2" cellpadding="2">		            
			            <p:dataTable var="equipeCursor" id="tabelaEquipe" value="#{supervisaoEquipeBean.listarEquipeLista}" emptyMessage="Nenhum registro encontrado" rows="5" stripedRows="true" size="small" paginator="true" 
							 paginatorPosition="bottom" paginatorTemplate="{CurrentPageReport} {FirstPageLink} {PreviousPageLink} {PageLinks} {NextPageLink} {LastPageLink} {RowsPerPageDropdown}"
                 			 currentPageReportTemplate="{startRecord}-{endRecord} de {totalRecords} registros">				
						
							<p:column headerText="EQUIPE" style="width: 53%">
								<h:outputText value="#{equipeCursor.supervisaoEquipeID.funcionario.nome}" style="font-size: 0.9rem; font-weight: bold;"/>
							</p:column>
							
							<p:column headerText="FUNÇÃO" style="width: 40%">
								<h:outputText value="#{equipeCursor.supervisaoEquipeID.funcionario.funcao}" style="font-size: 0.9rem; font-weight: bold;"/>
							</p:column>

							<p:column style="width: 7%">
								<p:commandButton id="btnApagar" process="@this" actionListener="#{supervisaoEquipeBean.excluir(equipeCursor)}" style="width:33px; margin-left: .5em" update=":msgGlobal :frmDialogoSupervisaoUsuarios:tabelaEquipe" styleClass="ui-button-danger" icon="pi pi-trash" rendered="#{equipeCursor.supervisaoEquipeID.supervisor.codigo == autenticacaoBean.funcionarioLogado.codigo}">
									<p:confirm header="CONFIRMAÇÃO" message="REMOVER PARTICIPANTE?" icon="pi pi-exclamation-triangle"/>
								</p:commandButton>
								<p:tooltip for="btnApagar" value="Remover participante" position="top"/>		
							</p:column>										
						</p:dataTable>			              		                    		           		      
			        </h:panelGrid>				
			    </h:form>
			</p:dialog>	
			
			<p:confirmDialog global="true" showEffect="fade" hideEffect="fade" responsive="true" width="500">
	            <p:commandButton value="NÃO" type="button" styleClass="ui-confirmdialog-no ui-button-flat" />
	            <p:commandButton value="SIM" type="button" styleClass="ui-confirmdialog-yes" />
	        </p:confirmDialog>
				
	</ui:define>
	</ui:composition>
</html>
