<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://xmlns.jcp.org/jsf/core"
	xmlns:p="http://primefaces.org/ui"
	xmlns:ui="http://xmlns.jcp.org/jsf/facelets">

	<ui:composition template="/templates/modeloGeral.xhtml">
		<ui:define name="metadata"> 
			<f:metadata>
				<f:viewParam name="funccod" value="#{funcionarioBean.codigo}"/>
				<f:viewParam name="perfcod" value="#{gestaoPerformanceBean.codigo}"/>							
	 			<f:event listener="#{funcionarioBean.carregarCadastro}" type="preRenderView"/>
	 			<f:event listener="#{gestaoPerformanceBean.carregarCadastro}" type="preRenderView"/>
	 			<f:event listener="#{gestaoPerformanceFuncBean.carregarCadastro}" type="preRenderView"/>
	 			<f:event listener="#{gestaoPerformanceFuncBean.carregarPesquisa}" type="preRenderView"/>
	 			<f:event listener="#{gestaoPerformanceFuncBean.carregarTotalPerformanceFunc}" type="preRenderView"/>					
			</f:metadata>
		</ui:define>
			    			
		<ui:define name="conteudo">
			<h:panelGrid id="pnlFunCadDados" columns="4" cellpadding="5">	
					<p:outputLabel value="CÓDIGO " style="font-weight:bold"/>
					<p:inputText value="#{funcionarioBean.funcionarioCadastro.codigo}" readonly="true" style="font-weight:bold; width: 100px;"/>
					
					<p:outputLabel value="NOME " style="font-weight:bold"/>
					<p:inputText size="30" value="#{funcionarioBean.funcionarioCadastro.nome.toUpperCase()}" readonly="true" style="font-weight:bold"/>
			
			</h:panelGrid>	
			
			<p:tabView id="tabViewPerformance">
			    <p:tab title="PERFORMANCE" id="tabPerformance">
			        <p:panelGrid id="gridGraficoMes" columns="2">
			 			<p:column>
			    			<h:panelGrid columns="2" style="width:100%; background-color: #bfddf3 !important; text-align:center; font-weight:bold;">
								<h:outputLabel>PERFORMANCE 2023</h:outputLabel>
								<p:commandButton actionListener="#{gestaoPerformanceFuncBean.novo}" update=":tabViewPerformance:frmDialogoPerformance:pnlDialogoPerformance" icon="pi pi-star" style="font-size: 0.5rem; height: 1.5rem; width:1.5rem;" oncomplete="PF('abrirDialogoPerformance').show();"/>
						    </h:panelGrid>
						    <h:form id="frmPerformanceCad">
								<style>
								    .metabatida {
								        background-color: #c8e6c9 !important;								        
    									color: #256029 !important;
								    }
								</style>
								
								<p:dataTable id="tabelaPerformance" var="gestaoPerformanceFuncCursor" value="#{gestaoPerformanceFuncBean.listaGestaoPerformanceFunc}" rowStyleClass="#{gestaoPerformanceFuncCursor.metaPercentual le 99.99 ? null : 'metabatida' }" emptyMessage="Nenhum registro encontrado" rows="12" style="margin-right: 0; padding: 0rem; font-size: 14px;" stripedRows="true" showGridlines="true" size="small">
									<p:column headerText="MÊS" style="width: 6%; font-weight:bold;">
										<h:outputText value="#{gestaoPerformanceFuncCursor.mes}"/>
									</p:column>
												
									<p:column headerText="META" style="width: 5%; padding: 0.1rem 0.5rem;">
										<h:outputText value="#{gestaoPerformanceFuncCursor.meta}">
											<f:convertNumber type="currency" currencySymbol="R$"/>
										</h:outputText>
									</p:column>
													
									<p:column headerText="VENDA" style="width: 5%">
										<h:outputText value="#{gestaoPerformanceFuncCursor.venda}">
											<f:convertNumber type="currency" currencySymbol="R$"/>
										</h:outputText>
									</p:column>
													
									<p:column headerText="% META" style="width: 5%">
										<h:outputText value="#{gestaoPerformanceFuncCursor.metaPercentual}%"/>
									</p:column>
													
									<p:column headerText="REJEIÇÃO" style="width: 5%">
										<h:outputText value="#{gestaoPerformanceFuncCursor.rejeicao}%"/>
									</p:column>
												
									<p:column headerText="" style="width: 1%">
										<p:commandButton type="button" icon="pi pi-search"  styleClass="rounded-button ui-button-success ui-button-flat" style="font-size: 0.5rem; height: 1.0rem; width:1.0rem;" />	
									</p:column>
									<p:column headerText="" style="width: 1%">
										<p:commandButton type="button" icon="pi pi-trash"  styleClass="rounded-button ui-button-success ui-button-flat" style="font-size: 0.5rem; height: 1.0rem; width:1.0rem;" />
									</p:column>
								</p:dataTable>
							</h:form>
										
							<h:form id="frmDialogoPerformance">
								<p:dialog widgetVar="abrirDialogoPerformance" header="PERFORMANCE" draggable="false" resizable="false" modal="true" showEffect="fade"  responsive="true"> 
									<p:panel id="pnlDialogoPerformance" style="margin-bottom:10px;">
										<h:panelGrid columns="4" cellpadding="2">
											<p:outputLabel value="MÊS" style="font-weight:bold"/>
										    <p:selectOneMenu id="mes" value="#{gestaoPerformanceFuncBean.gestaoPerformanceFuncCadastro.mes}"  style="font-weight:bold; width: 200px;">
										    	<f:selectItem itemLabel="" itemValue=""/>
										        <f:selectItem itemLabel="JANEIRO" itemValue="JANEIRO"/>
										        <f:selectItem itemLabel="FEVEREIRO" itemValue="FEVEREIRO"/>
										        <f:selectItem itemLabel="MARÇO" itemValue="MARÇO"/>
										        <f:selectItem itemLabel="ABRIL" itemValue="ABRIL"/>
										        <f:selectItem itemLabel="MAIO" itemValue="MAIO"/>
										        <f:selectItem itemLabel="JUNHO" itemValue="JUNHO"/>
										        <f:selectItem itemLabel="JULHO" itemValue="JULHO"/>
										        <f:selectItem itemLabel="AGOSTO" itemValue="AGOSTO"/>
										        <f:selectItem itemLabel="SETEMBRO" itemValue="SETEMBRO"/>
										        <f:selectItem itemLabel="OUTUBRO" itemValue="OUTUBRO"/>
										        <f:selectItem itemLabel="NOVEMBRO" itemValue="NOVEMBRO"/>
										        <f:selectItem itemLabel="DEZEMBRO" itemValue="DEZEMBRO"/>
										    </p:selectOneMenu>
														               
										    <p:outputLabel value="META" style="font-weight:bold"/>
											<p:inputNumber id="meta" value="#{gestaoPerformanceFuncBean.gestaoPerformanceFuncCadastro.meta}" maxValue="999999.99" decimalPlaces="2" style="font-weight:bold;  width: 150px;"/>
												  			   
											<p:outputLabel value="VENDA" style="font-weight:bold"/>
											<p:inputNumber id="venda" value="#{gestaoPerformanceFuncBean.gestaoPerformanceFuncCadastro.venda}" maxValue="999999.99" decimalPlaces="2" style="font-weight:bold; width: 150px;"/>
														               
											<p:outputLabel value="REJEIÇÃO" style="font-weight:bold"/>
											<p:inputNumber id="rejeicao" value="#{gestaoPerformanceFuncBean.gestaoPerformanceFuncCadastro.rejeicao}" symbol="%" symbolPosition="s" maxValue="99.99" decimalPlaces="2" style="font-weight:bold; width: 150px;"/>
														                         
										</h:panelGrid>
									</p:panel>
									<f:facet name="footer">
							        	<p:commandButton value="SALVAR" icon="pi pi-check" actionListener="#{gestaoPerformanceFuncBean.salvar}" update=":msgGlobal pnlDialogoPerformance tabViewPerformance:frmPerformanceCad tabViewPerformance:graficoVendaMeta" process="pnlDialogoPerformance @this" />                                                                                                       
							        </f:facet>
								</p:dialog>   
							</h:form>
							<p:divider/>
							
							<h:panelGrid id="pnlFunCadDados" columns="4" cellpadding="5" styleClass="status-badge status-formula" style="width:100%;font-weight:bold;">	
								<p:outputLabel value="TOTAL META "/>		
								<p:inputNumber value="#{gestaoPerformanceFuncBean.totalMetaPerformanceFunc}"  symbol="R$ " readonly="true" inputStyle="font-weight:bold; font-size: 15px; width:170px;"/>
										
								<p:outputLabel value="TOTAL VENDAS "/>
								<p:inputNumber value="#{gestaoPerformanceFuncBean.totalVendasPerformanceFunc}"  symbol="R$ " readonly="true" inputStyle="font-weight:bold; font-size: 15px; width:170px;"/>
										
								<p:outputLabel value="MÉDIA % META "/>
								<p:inputNumber value="#{gestaoPerformanceFuncBean.mediaMetaPercentual}" symbol="%" symbolPosition="s" readonly="true" inputStyle="font-weight:bold; font-size: 15px; width:170px" />
												
								<p:outputLabel value="MÉDIA REJEIÇÃO"/>
								<p:inputNumber value="#{gestaoPerformanceFuncBean.mediaRejeicaoPercentual}" symbol="%" symbolPosition="s" readonly="true" inputStyle="font-weight:bold; font-size: 15px; width:170px" />
										
								<p:outputLabel value="ABAIXO 80% META"/>
								<p:inputText value="#" readonly="true" style="font-weight:bold; width: 170px;"/>
										
								<p:outputLabel value="RANKING ANUAL"/>
								<p:inputText id="ranking" value="#" readonly="true" style="font-weight:bold; width: 170px;"/>
							</h:panelGrid>	
			    		</p:column>
			  			<p:column id="coluna">
			    			<p:barChart id="graficoVendaMeta" model="#{graficoPerformanceFunc.mixedModelPerformanceFunc}" style="width: 100%; height: 330px; background-color: #e9e9e9"/>
			    			<p:divider/>
			    			<p:barChart id="graficoVendaMeta2" model="#{graficoPerformanceFunc.modeloBarraEmpilhada}" style="width: 100%; height: 330px; background-color: #e9e9e9"/>
<!-- 			    			<p:divider/>
			    			<p:lineChart id="graficoVendaMeta3" model="#{graficoPerformanceFunc.modeloCartesianoPerformance}" style="width: 100%; height: 300px; background-color: #e9e9e9"/>  -->
			    		</p:column>
					</p:panelGrid>
				</p:tab>    	
			</p:tabView>
	</ui:define>
	</ui:composition>
</html>
