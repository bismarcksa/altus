<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://xmlns.jcp.org/jsf/core"
	xmlns:p="http://primefaces.org/ui"
	xmlns:ui="http://xmlns.jcp.org/jsf/facelets">

	<ui:composition template="/templates/modeloGeral.xhtml">
		<ui:define name="metadata"> 
			<f:metadata>
				<f:event listener="#{grupoBean.carregarPesquisa}" type="preRenderView"/>
			</f:metadata>
		</ui:define>
		
		<ui:define name="conteudo">
			<h:form>
				
				<p:dataTable var="grupoCursor" value="#{grupoBean.listaGrupos}" filteredValue="#{grupoBean.listaGruposFiltrados}" emptyMessage="Nenhum registro encontrado" rows="10" paginator="true" paginatorPosition="bottom" style="margin-right: 0; padding: 0rem; font-size: 15px;" stripedRows="true" size="small">
 				<f:facet name="header">
						<p:button value="NOVO GRUPO" outcome="/pages/grupoCadastro.xhtml" icon="pi pi-user-plus">
		  					<f:param name="acao" value="Novo"/>
						</p:button>	
					</f:facet>
					
					<p:column headerText="CÓDIGO" style="width: 4%">
						<h:outputText value="#{grupoCursor.codigo}"/>
					</p:column>
					
					<p:column style="width: 4%; text-align: center; padding: 0.2; line-height: 0;">
						<!-- Imagem do usuário -->
						<p:graphicImage value="/image?path=#{grupoCursor.foto}" width="50" height="50" style="border-radius: 50%; border: 2px solid #ccc;" rendered="#{not empty grupoCursor.foto}" />									
						<!-- Imagem padrão -->
						<p:graphicImage value="/resources/images/usuario.png" width="50" height="50" style="border-radius: 50%; border: 2px solid #ccc;" rendered="#{empty grupoCursor.foto}" />						
							        	
					</p:column>
					
					<p:column headerText="DESCRIÇÃO" style="width: 40%">
						<h:outputText value="#{grupoCursor.descricao.toUpperCase()}"/>
					</p:column>
									
					
 					<p:column headerText="OPÇÕES" style="width: 30%">
						<p:button value="EXCLUIR" outcome="/pages/grupoCadastro.xhtml" icon="pi pi-trash">
	  						<f:param name="codigo" value="#{grupoCursor.codigo}"/>
							<f:param name="acao" value="Excluir"/> 
						</p:button> 
						
						<p:button value="EDITAR" outcome="/pages/grupoCadastro.xhtml" styleClass="ui-button-secondary" style="margin-left: .5em" icon="pi pi-file-edit">
  							<f:param name="codigo" value="#{grupoCursor.codigo}"/>
						 	<f:param name="acao" value="Editar"/>
						</p:button>
						
						<p:button value="PARTICIPANTES" outcome="/pages/grupoCadastro.xhtml" styleClass="ui-button-success" style="margin-left: .5em" icon="pi pi-user">
  							<f:param name="codigo" value="#{grupoCursor.codigo}"/>
						 	<f:param name="acao" value="Participantes"/>
						</p:button>
					</p:column>
				</p:dataTable>
			</h:form>
		</ui:define>
	</ui:composition>
</html>
